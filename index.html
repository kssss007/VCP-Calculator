    // --- Google Sheets Apps Script Setup Template (A - W aligned) ---
    const GAS_TEMPLATE = `// 1. Copy this script
// 2. Open your Google Sheet -> Extensions -> Apps Script
// 3. Paste and Deploy as a "Web App" (Execute as: Me, Access: Anyone)

function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var payload = JSON.parse(e.postData.contents);
  
  if (payload.action === "ping") {
    return ContentService.createTextOutput(JSON.stringify({status: "success", message: "Connected"}))
      .setMimeType(ContentService.MimeType.JSON);
  }
  else if (payload.action === "pull") {
    var data = sheet.getDataRange().getValues();
    var activeTrades = [];
    var historyTrades = [];
    
    for (var i = 1; i < data.length; i++) {
      var row = data[i];
      if (!row[0]) continue;
      
      var trade = {
        id: row[0].toString(),
        symbol: row[1] || "",
        entryDate: row[2] || "",
        type: row[4] || "buy",
        entry: parseFloat(row[6]) || 0,
        stopLoss: parseFloat(row[9]) || 0,
        target: parseFloat(row[11]) || 0,
        riskR: parseFloat(row[13]) || 1.0,
        shares: parseInt(row[16]) || 0,
        positionValue: parseFloat(row[17]) || 0,
        rationale: row[22] || ""
      };
      
      var status = row[15] || "Active";
      if (status === "Active") {
        activeTrades.push(trade);
      } else {
        trade.exitPrice = parseFloat(row[7]) || 0;
        trade.closedAt = row[3] ? new Date(row[3]).getTime() : Date.now();
        historyTrades.push(trade);
      }
    }
    
    return ContentService.createTextOutput(JSON.stringify({
      status: "success", 
      active: activeTrades, 
      history: historyTrades
    })).setMimeType(ContentService.MimeType.JSON);
  }
  else if (payload.action === "add") {
    var row = sheet.getLastRow() + 1;
    
    // Generate Sheets Formulas for real-time tracking
    var curPriceFormula = '=IFERROR(GOOGLEFINANCE(B' + row + ', "price"), G' + row + ')';
    var pnlFormula = '=IF(P' + row + '="Active", IF(E' + row + '="buy", (S' + row + '-G' + row + ')*Q' + row + ', (G' + row + '-S' + row + ')*Q' + row + '), IF(E' + row + '="buy", (H' + row + '-G' + row + ')*Q' + row + ', (G' + row + '-H' + row + ')*Q' + row + '))';
    var pnlPercentFormula = '=IFERROR(T' + row + '/R' + row + ', 0)';
    var pnlRiskFormula = '=IFERROR(T' + row + '/O' + row + ', 0)';
    var returnFormula = '=IF(P' + row + '="Closed", IF(E' + row + '="buy", (H' + row + '-G' + row + ')/G' + row + ', (G' + row + '-H' + row + ')/G' + row + '), "")';
    var statusFormula = '=IF(ISNUMBER(H' + row + '), "Closed", "Active")';

    var rowData = [
      payload.tradeId.toString(),// A - ID
      payload.symbol,           // B - symbol
      payload.entryDate,        // C - entry date
      "",                       // D - exit date
      payload.type,             // E - direction
      "",                       // F - pattern (for future development)
      payload.entry,            // G - Entry price
      "",                       // H - Exit price
      returnFormula,            // I - return
      payload.stopLoss,         // J - stop price
      payload.slPercent,        // K - stop percentage
      payload.target,           // L - target price
      payload.targetPercent,    // M - target percentage
      payload.rrRatio,          // N - Reward:risk
      payload.maxRiskAmount,    // O - Max risk amount ($)
      statusFormula,            // P - status
      payload.shares,           // Q - Quantity of shares
      payload.positionValue,    // R - Notional
      curPriceFormula,          // S - Current price
      pnlFormula,               // T - P&L
      pnlPercentFormula,        // U - P&L%
      pnlRiskFormula,           // V - P&L of risk (divided by max risk)
      payload.rationale         // W - comment
    ];
    
    sheet.appendRow(rowData);
    return ContentService.createTextOutput(JSON.stringify({status: "success", message: "Trade added"}))
      .setMimeType(ContentService.MimeType.JSON);
  } 
  else if (payload.action === "close") {
    var data = sheet.getDataRange().getValues();
    for (var i = 1; i < data.length; i++) {
      var sheetId = data[i][0] ? data[i][0].toString().trim() : "";
      var payloadId = payload.tradeId ? payload.tradeId.toString().trim() : "";
      
      if (sheetId === payloadId || Number(sheetId) === Number(payloadId)) {
        sheet.getRange(i + 1, 4).setValue(payload.exitDate);   // D - Exit Date
        sheet.getRange(i + 1, 8).setValue(Number(payload.exitPrice));  // H - Exit Price (triggers sheet status auto-calculation)
        return ContentService.createTextOutput(JSON.stringify({status: "success"}))
          .setMimeType(ContentService.MimeType.JSON);
      }
    }
    return ContentService.createTextOutput(JSON.stringify({status: "error", message: "ID not found"}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

    const formatCommas = (value) => {
      if (value === null || value === undefined || value === '') return '';
      const cleanValue = value.toString().replace(/[^0-9.]/g, '');
      const parts = cleanValue.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');

        if (!parsedSymbol) return null;

        const searchUrl = `https://symbol-search.tradingview.com/symbol_search/?text=${encodeURIComponent(parsedSymbol)}`;
        const proxies = [
          `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`,
          `https://api.codetabs.com/v1/proxy/?url=${encodeURIComponent(searchUrl)}`
        ];

        let bestMatch = null;
        for (const proxyUrl of proxies) {
          try {
            const res = await fetch(proxyUrl);
            if (res.ok) {
              let data;
              if (proxyUrl.includes("allorigins")) {
                const wrapper = await res.json();
                data = JSON.parse(wrapper.contents);
              } else {
                data = await res.json();
              }
              
              if (Array.isArray(data) && data.length > 0) {
                bestMatch = data.find(item => item.symbol.toUpperCase() === parsedSymbol) || data[0];
                if (bestMatch) break;
              }
            }
          } catch (e) {
            console.warn(`Proxy ${proxyUrl} failed to fetch TradingView Symbol Search`);
          }
        }

        if (!bestMatch) {
          console.warn("No symbol match resolved on TradingView search endpoints");
          return null;
        }

        const exchange = (bestMatch.exchange || bestMatch.prefix || "").toUpperCase();
        const symbolCode = (bestMatch.symbol || "").toUpperCase();
        if (!exchange || !symbolCode) return null;

        const ticker = `${exchange}:${symbolCode}`;
        const scannerUrl = `https://scanner.tradingview.com/global/scan`;

          symbols: {
            tickers: [ticker],
            query: { types: [] }
          },
          columns: ["close"]
        };

          const res = await fetch(scannerUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            const data = await res.json();
            const price = data?.data?.[0]?.d?.[0];
            if (price) return parseFloat(price);
          }
        } catch (e) {
          console.warn("Direct scanner fetch blocked, falling back to proxy scanner request...");

            method: "POST",

        const ePrice = parseFloat(entry) || 0;
        const val = parseFloat(rrValue) || 0;
        const riskPerShare = slCalc.isValid ? Math.abs(ePrice - slCalc.price) : 0;

        if (ePrice <= 0 || val <= 0) {
          return { ratio: 2.0, targetPrice: 0, targetPercent: 0, isValid: false };
        }

        if (rrMode === 'ratio') {
          if (riskPerShare <= 0) {
            return { ratio: val, targetPrice: 0, targetPercent: 0, isValid: false };
          }
          const targetPrice = tradeType === 'buy' ? ePrice + (riskPerShare * val) : ePrice - (riskPerShare * val);
          return { ratio: val, targetPrice, targetPercent: (Math.abs(targetPrice - ePrice) / ePrice) * 100, isValid: true };
        } else if (rrMode === 'price') {
          const targetPrice = val;
          const targetPercent = (Math.abs(targetPrice - ePrice) / ePrice) * 100;
          const ratio = riskPerShare > 0 ? Math.abs(targetPrice - ePrice) / riskPerShare : 0;
          const isPriceDirectionValid = tradeType === 'buy' ? targetPrice > ePrice : targetPrice < ePrice;
          return { 
            ratio, 
            targetPrice, 
            targetPercent, 
            isValid: isPriceDirectionValid 
          };
        } else { // rrMode === 'percent'
          const targetPercent = val;
          const targetPrice = tradeType === 'buy' ? ePrice * (1 + (val / 100)) : ePrice * (1 - (val / 100));
          const ratio = riskPerShare > 0 ? Math.abs(targetPrice - ePrice) / riskPerShare : 0;
          return { ratio, targetPrice, targetPercent, isValid: true };
        }
      }, [entry, rrValue, rrMode, slCalc, tradeType]);

      const calculations = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        if (ePrice <= 0 || !slCalc.isValid || !rrRatioComputed.isValid || portfolio <= 0) {
          return { isValid: false, oneR };
        }

        const riskPerShare = Math.abs(ePrice - slCalc.price);
        const totalRiskAmount = oneR * riskR;
        const positionSize = Math.floor(totalRiskAmount / riskPerShare);
        const positionValue = positionSize * ePrice;
        const scaleFirstShares = Math.floor(positionSize * firstBetMultiplier);
        
        return {
          isValid: true,
          oneR, riskPerShare, totalRiskAmount, positionSize, positionValue, 
          targetPrice: rrRatioComputed.targetPrice, slPercentage: slCalc.percent,
          scaleFirstShares, scaleFirstCap: scaleFirstShares * ePrice, 
          scaleRemainingShares: positionSize - scaleFirstShares, 
          scaleRemainingCap: (positionSize - scaleFirstShares) * ePrice
        };
      }, [portfolio, rPercent, entry, slCalc, riskR, rrRatioComputed, oneR, firstBetMultiplier]);

      useEffect(() => {
        if (calculations.isValid && debouncedStockCode) {
          trackGAEvent('vcp_calculated', { 'event_category': 'engagement' });
        }
      }, [calculations.isValid, debouncedStockCode]);

      useEffect(() => {
        const cached = localStorage.getItem('vcp_state');
        if (cached) {
          try {
            const data = JSON.parse(cached);
            if (data.portfolioInput) setPortfolioInput(data.portfolioInput);
            if (data.rPercent) setRPercent(data.rPercent);
            if (data.trades && Array.isArray(data.trades)) setTrades(data.trades);
            if (data.history && Array.isArray(data.history)) setHistory(data.history);
          } catch (e) {
            console.warn("Cached recovery failed", e);
          }
        }
      }, []);

      const saveLocalData = (pIn, rPer, trds, hist) => {
        const payload = JSON.stringify({ portfolioInput: pIn, rPercent: rPer, trades: trds, history: hist });
        localStorage.setItem('vcp_state', payload);
      };

      const triggerSave = (newPortfolio, newRPercent, newTrades, newHistory) => {
        saveLocalData(newPortfolio, newRPercent, newTrades, newHistory);
      };

      const updatePortfolioValue = (newValue) => {
        setPortfolioInput(newValue);
        triggerSave(newValue, rPercent, trades, history);
      };

      const updateRPercentValue = (newValue) => {
        setRPercent(newValue);
        triggerSave(portfolioInput, newValue, trades, history);
      };

      const updateTradesList = (newTrades) => {
        const safeTrades = Array.isArray(newTrades) ? newTrades : [];
        setTrades(safeTrades);
        triggerSave(portfolioInput, rPercent, safeTrades, history);
      };

      const updateHistoryList = (newHistory) => {
        const safeHistory = Array.isArray(newHistory) ? newHistory : [];
        setHistory(safeHistory);
        triggerSave(portfolioInput, rPercent, trades, safeHistory);
      };

      const handlePortfolioInputChange = (e) => {

        }

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      useEffect(() => {
        const timer = setTimeout(() => setDebouncedStockCode(stockCode.trim().toUpperCase()), 800);
        return () => clearTimeout(timer);
      }, [stockCode]);

      useEffect(() => {
        const loadCalcPrice = async () => {
          if (!debouncedStockCode) return;
          setIsFetchingPrice(true);
          setPriceFetchFailed(false);
          const price = await fetchPriceForSymbol(debouncedStockCode);
          if (price) {
            setEntry(price.toFixed(2));
          } else {
            setPriceFetchFailed(true);
          }
          setIsFetchingPrice(false);

        loadCalcPrice();
      }, [debouncedStockCode]);

      // Handle TradingView Script Loading and Widget Rendering
      useEffect(() => {

        const containerId = "tv_chart_container";

              interval: interval,

      const handleTouchStart = (e) => {

      // Computed Results for Annualized Calculator
      const annualCalculations = useMemo(() => {
        const d = parseInt(annualDuration) || 0;
        if (d <= 0) {
          return { isValid: false, errorMsg: t.invalidDuration };
        }

        let rSt = 0;
        if (annualInputMode === 'percent') {
          rSt = (parseFloat(annualReturnPercent) || 0) / 100;
        } else {
          const principal = parseFloat(parseCommas(annualInitialPrincipal)) || 0;
          const profit = parseFloat(parseCommas(annualProfitAmount)) || 0;
          if (principal <= 0) {
            return { isValid: false, errorMsg: t.invalidPrincipal };
          }
          rSt = profit / principal;
        }

        // Compounded AR (CAGR)
        const compoundedRate = (Math.pow(1 + rSt, annualYearlyBase / d) - 1) * 100;

        // Simple AR
        const simpleRate = rSt * (annualYearlyBase / d) * 100;

        const timeFactor = annualYearlyBase / d;
        const shortTermPercent = rSt * 100;
        const isExtreme = compoundedRate > 10000;

        return {
          isValid: true,
          duration: d,
          shortTermPercent,
          compoundedRate,
          simpleRate,
          timeFactor,
          isExtreme
        };
      }, [annualDuration, annualInputMode, annualReturnPercent, annualInitialPrincipal, annualProfitAmount, annualYearlyBase, t]);

      const handleToggleSLMode = (newMode) => {
        if (newMode === slMode) return;
        const ePrice = parseFloat(entry) || 0;
        const currentVal = parseFloat(slValue) || 0;

        if (ePrice > 0 && currentVal > 0) {
          if (newMode === 'percent') {
            if (tradeType === 'buy' && currentVal < ePrice) setSlValue((((ePrice - currentVal) / ePrice) * 100).toFixed(2));
            else if (tradeType === 'sell' && currentVal > ePrice) setSlValue((((currentVal - ePrice) / ePrice) * 100).toFixed(2));
            else setSlValue('');
          } else {
            if (currentVal < 100) setSlValue((tradeType === 'buy' ? ePrice * (1 - currentVal / 100) : ePrice * (1 + currentVal / 100)).toFixed(2));
            else setSlValue('');
          }
        }
        setSlMode(newMode);

      const handleToggleRRMode = (newMode) => {

      const portfolioStats = useMemo(() => {

        const totalRiskR = trades.reduce((sum, trade) => sum + trade.riskR, 0);
        const remainingCash = portfolio - totalInvested;
        const investedPercent = portfolio > 0 ? (totalInvested / portfolio) * 100 : 0;

        let netProfit = 0;
        trades.forEach(trade => {
          const livePrice = livePrices[trade.symbol];
          if (livePrice) {
            const isBuy = trade.type !== 'sell';
            netProfit += (isBuy ? (livePrice - trade.entry) : (trade.entry - livePrice)) * trade.shares;
          }
        });

        const realizedPnL = history.reduce((sum, h) => {
          const isBuy = h.type !== 'sell';
          return sum + ((isBuy ? (h.exitPrice - h.entry) : (h.entry - h.exitPrice)) * h.shares);
        }, 0);
        
        const netProfitPercent = portfolio > 0 ? (netProfit / portfolio) * 100 : 0;
        const realizedPnLPercent = portfolio > 0 ? (realizedPnL / portfolio) * 100 : 0;

        return { totalInvested, remainingCash, totalRiskR, investedPercent, netProfit, netProfitPercent, realizedPnL, realizedPnLPercent };
      }, [trades, history, portfolio, livePrices]);

          type: newTrade.type,
          entry: newTrade.entry,
          stopLoss: slCalc.price,
          slPercent: slCalc.percent / 100,
          target: calculations.targetPrice,
          targetPercent: rrRatioComputed.targetPercent / 100,
          rrRatio: rrRatioComputed.ratio,
          maxRiskAmount: calculations.totalRiskAmount,
          shares: calculations.positionSize,
          positionValue: calculations.positionValue,
          rationale: rationale.trim()
        });

        // Trigger GA4 Save to Sheets Trackers safely
        trackGAEvent('vcp_saved_to_cloud', { 'event_category': 'engagement' });

        setRationale(''); 
        setActiveTab('port');
      };

      const handleClosePositionClick = (trade) => {
        setClosingTrade(trade);
        const currentLive = livePrices[trade.symbol];
        setExitPriceInput(currentLive ? currentLive.toFixed(2) : trade.entry.toFixed(2));
      };

      const handleConfirmPositionClose = () => {
        if (!closingTrade) return;
        const exitPr = parseFloat(exitPriceInput) || 0;
        const closedAtTime = Date.now();
        
        const closedRecord = {
          ...closingTrade,
          exitPrice: exitPr,
          closedAt: closedAtTime
        };

        const remainingActive = trades.filter(t => String(t.id) !== String(closingTrade.id));
        const newHistory = [closedRecord, ...history];

        updateTradesList(remainingActive);
        updateHistoryList(newHistory);

        pushDataToGoogleSheets({
          action: "close",
          tradeId: closingTrade.id,
          exitPrice: exitPr,
          exitDate: new Date(closedAtTime).toLocaleString()
        });

        setClosingTrade(null);
        setActiveTab('history');
      };

      const removeTrade = (id) => {
        updateTradesList(trades.filter(t => String(t.id) !== String(id)));
      };
      
      const removeHistoryItem = (id) => {
        updateHistoryList(history.filter(h => String(h.id) !== String(id)));
      };

      const executeClearAction = () => {
        if (confirmClearAction === 'trades') updateTradesList([]);
        else if (confirmClearAction === 'history') updateHistoryList([]);
        setConfirmClearAction(null);
      };

      const handleStartEditNote = (trade) => {
        setEditingTradeId(trade.id);
        setEditTradeNotes(trade.rationale || '');
      };

      const handleSaveInlineNote = (tradeId) => {
        const updatedTrades = trades.map(t => String(t.id) === String(tradeId) ? { ...t, rationale: editTradeNotes.trim() } : t);
        updateTradesList(updatedTrades);
        setEditingTradeId(null);
      };

      const getStopLossBtnClass = (mode) => "px-3 py-1 rounded-md font-medium text-xs transition-colors cursor-pointer " + (slMode === mode ? "bg-white dark:bg-neutral-800 text-blue-500 shadow-sm" : "text-gray-500 dark:text-neutral-400 hover:text-gray-700");
      const getRrBtnClass = (mode) => "px-3 py-1 rounded-md font-medium text-xs transition-colors cursor-pointer " + (rrMode === mode ? "bg-white dark:bg-neutral-800 text-blue-500 shadow-sm" : "text-gray-500 dark:text-neutral-400 hover:text-gray-700");

      const getRiskMessage = (r) => {
        if (r < 1.0) return { msg: t.riskTooSmall, color: 'text-yellow-500' };
        if (r <= 2.0) return { msg: t.riskOptimal, color: 'text-green-500' };
        return { msg: t.riskTooLarge, color: 'text-red-500' };
      };
      const riskInfo = getRiskMessage(riskR);

      const targetRiskMarks = useMemo(() => {
        let marks = [{ val: 0, label: '0R', isBold: false, isMax: false }];
        if (maxTargetRisk >= 1) marks.push({ val: 1, label: '1R', isBold: true, isMax: false });
        if (maxTargetRisk >= 2) marks.push({ val: 2, label: '2R', isBold: true, isMax: false });
        marks.push({ val: maxTargetRisk, label: `${maxTargetRisk}R`, isBold: false, isMax: true });
        
        const uniqueMarks = [];
        const seen = new Set();
        marks.forEach(m => {
          if (!seen.has(m.val)) {
            seen.add(m.val);
            uniqueMarks.push(m);
          } else if (m.isMax) {
            uniqueMarks[uniqueMarks.findIndex(um => um.val === m.val)].isMax = true;
          }

        return uniqueMarks;

      const getProgressiveBetClass = (val) => {

      const iOSCardClass = `bg-white dark:bg-[#1C1C1E] rounded-2xl p-[1.5em] shadow-sm mb-[1.5em] transition-colors relative z-0`;

      const ScrollingCopyrightFooter = () => html`
        <div class="py-8 text-center text-[0.75em] text-gray-400 dark:text-gray-600 border-t border-gray-100 dark:border-neutral-900 mt-8 mb-4">
          <span>© 2026 Trading Risk Calculator. All Rights Reserved.</span>
        </div>
      `;

      // Precompiled modal button style maps to completely avoid template lit parser syntax crashes
      const themeLightClass = "flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center space-x-2 border transition-all " + 
        (theme === 'light' ? 'bg-white text-blue-500 border-blue-500 shadow-sm' : 'bg-gray-50 dark:bg-neutral-800 border-transparent text-gray-500 dark:text-neutral-400 hover:bg-gray-100');
      const themeDarkClass = "flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center space-x-2 border transition-all " + 
        (theme === 'dark' ? 'bg-neutral-800 text-blue-500 border-blue-500 shadow-sm' : 'bg-gray-50 dark:bg-neutral-800 border-transparent text-gray-500 dark:text-neutral-400 hover:bg-gray-100');

      const langZhClass = "flex-1 py-2 rounded-xl text-sm font-semibold border transition-all " +

      return html`

          <!-- FIXED TOP NAVIGATION RIBBON (Centered tab selector) -->

                <div class="absolute left-0 top-0 bottom-0 w-4 sm:w-6 bg-gradient-to-r from-white dark:from-neutral-900 to-transparent z-10 pointer-events-none"></div>
                <div class="absolute right-0 top-0 bottom-0 w-4 sm:w-6 bg-gradient-to-l from-white dark:from-neutral-900 to-transparent z-10 pointer-events-none"></div>

               style=${{ transform: `translateX(calc(${-activeTabIndex * 33.333}% + ${dragOffset}px))`, alignItems: 'flex-start' }}
             >
                <!-- CALCULATOR VIEW -->
                <div 
                  ref=${el => scrollPanesRefs.current['calc'] = el}
                  class=${`w-1/3 h-full tab-scroll-pane hide-scrollbar px-4 pt-6 pb-24 ${activeTab === 'calc' || renderedTab === 'calc' ? 'opacity-100' : 'opacity-0 overflow-hidden'}`}
                >
                  <div class="max-w-3xl mx-auto flex flex-col justify-between min-h-full">
                    <div>
                      <!-- Sub-toggle Segment (Option A layout) for Calculator view selection -->
                      <div class="flex bg-gray-150 dark:bg-neutral-800 p-0.5 rounded-xl shadow-inner text-xs mb-6 no-swipe">
                        <button onClick=${() => setCalcSubTab('vcp')} class=${`flex-1 py-2 rounded-lg font-bold transition-all text-center cursor-pointer ${calcSubTab === 'vcp' ? 'bg-white dark:bg-neutral-700 text-blue-500 shadow' : 'text-gray-500 hover:text-gray-750 dark:text-neutral-400'}`}>
                          ${t.vcpCalc}

                          ${t.annualCalc}

                      <!-- Sub-tab conditional branch: [VCP POSITION CALC] vs [ANNUALIZED RETURN CALC] -->
                      ${calcSubTab === 'vcp' ? html`
                        <!-- MAIN VCP CALCULATOR INTERFACE -->
                        <div>

                            <span>${t.portfolioSize}: <strong class="text-gray-800 dark:text-gray-200">$${portfolio.toLocaleString()}</strong></span>
                            <span class="text-xs font-semibold px-3 py-1 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">
                              ${gdriveWebAppUrl ? t.cloudSyncing : t.localMode}

                            <span>1R = <strong class="text-blue-500">$${oneR.toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong></span>
                          </div>

                          <!-- Input Settings Card -->
                          <div class=${iOSCardClass}>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                              <div class="col-span-1 md:col-span-2">

                                     <div class="font-bold text-lg mb-1 flex flex-wrap items-center gap-2">
                                       <span class=${item.type === 'sell' ? 'text-red-500' : 'text-green-500'}>${item.type === 'sell' ? 'SHORT' : 'LONG'}</span>
                                       <span class="font-extrabold text-gray-800 dark:text-gray-200">${item.symbol}</span>
                                       <span class="text-xs px-2 py-1 bg-gray-100 dark:bg-neutral-800 rounded-md">${item.shares.toLocaleString()} shares | ${formatR(item.riskR)}R</span>
                                       <span class=${`text-xs px-2 py-1 rounded-md font-bold ${tradeProfit >= 0 ? 'bg-green-100 text-green-800 dark:bg-green-950 dark:text-green-300' : 'bg-red-100 text-red-800 dark:bg-red-950 dark:text-green-300'}`}>Profit: ${tradeProfit >= 0 ? '+' : ''}$${tradeProfit.toFixed(2)} (${tradeProfit >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)</span>
                                     </div>
                                     <div class="text-sm text-gray-500 dark:text-neutral-400 grid grid-cols-2 gap-x-6 gap-y-1">
                                       <span>Entry: $${item.entry.toFixed(2)}</span>
                                       <span>Exit: $${item.exitPrice.toFixed(2)}</span>
                                       <span>SL: $${item.stopLoss.toFixed(2)}</span>
                                       <span>Closed: ${new Date(item.closedAt).toLocaleDateString()}</span>
                                     </div>
                                     ${item.rationale && html`<div class="mt-2 text-xs italic opacity-70 text-gray-500 dark:text-neutral-400">Notes: ${item.rationale}</div>`}
                                   </div>
                                   <button onClick=${() => removeHistoryItem(item.id)} class="p-3 text-red-400 hover:text-red-600 bg-red-50 dark:bg-red-950/30 rounded-full transition-colors flex-shrink-0 cursor-pointer"><${TrashIcon} /></button>
                                 </div>
                               `;
                             })}
                           </div>
                         `}
                      </div>
                    </div>

                    <div class="py-8 text-center text-[0.75em] text-gray-400 dark:text-gray-600 border-t border-gray-100 dark:border-neutral-900 mt-8 mb-4">
                      <span>© 2026 Trading Risk Calculator. All Rights Reserved.</span>
                    </div>
                  </div>
                </div>

             </div>
          </main>

          <!-- iOS STYLE SIDE SHEET: SETTINGS MODAL (Opened from the Left) -->
          ${showSettingsModal && html`
            <div 
              class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-start animate-fade-in animate-slide-right"
              onClick=${() => setShowSettingsModal(false)}
            >
              <div 
                class="bg-white dark:bg-[#1C1C1E] w-full max-w-lg h-full shadow-2xl flex flex-col no-swipe"
                onClick=${(e) => e.stopPropagation()}
              >
                <!-- Fixed Header at the Top -->
                <div class="flex justify-between items-center px-6 py-4 border-b border-gray-200 dark:border-neutral-800 shrink-0">
                  <h3 class="font-extrabold text-xl flex items-center space-x-2">
                    <svg class="w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>${t.settings}</span>
                  </h3>
                  <button 
                    onClick=${() => setShowSettingsModal(false)}
                    class="px-4 py-2 bg-gray-100 dark:bg-neutral-800 text-gray-700 dark:text-gray-300 font-bold rounded-xl text-sm transition-colors cursor-pointer"
                  >
                    Close
                  </button>
                </div>

                <!-- Independent Scrollable Body Container -->
                <div class="flex-1 overflow-y-auto p-6 space-y-6 hide-scrollbar">
                  <!-- 1. Theme Section -->
                  <div class="space-y-2">
                    <h4 class="font-bold text-xs uppercase tracking-wider text-gray-400 dark:text-neutral-500">${t.theme}</h4>
                    <div class="flex space-x-2">
                      <button 
                        onClick=${() => setTheme('light')}
                        class=${themeLightClass}
                      >
                        <${SunIcon} />
                        <span>Light</span>
                      </button>
                      <button 
                        onClick=${() => setTheme('dark')}
                        class=${themeDarkClass}
                      >
                        <${MoonIcon} />
                        <span>Dark</span>
                      </button>
                    </div>
                  </div>

                  <!-- 2. Language Section -->
                  <div class="space-y-2">
                    <h4 class="font-bold text-xs uppercase tracking-wider text-gray-400 dark:text-neutral-500">${t.language}</h4>
                    <div class="flex space-x-2">
                      <button 
                        onClick=${() => setLang('en')}
                        class=${langEnClass}
                      >
                        English
                      </button>
                      <button 
                        onClick=${() => setLang('zh')}
                        class=${langZhClass}
                      >
                        繁體中文
                      </button>
                    </div>
                  </div>

                  <!-- 3. Font Size Adjustment -->
                  <div class="space-y-2">
                    <h4 class="font-bold text-xs uppercase tracking-wider text-gray-400 dark:text-neutral-500">${t.fontSize}</h4>
                    <div class="flex items-center justify-between bg-gray-50 dark:bg-neutral-800 p-2 rounded-xl">
                      <button 
                        onClick=${decreaseFont}
                        disabled=${fontScaleIdx === 0}
                        class="px-4 py-2 bg-white dark:bg-neutral-700 text-gray-700 dark:text-gray-300 font-bold rounded-lg disabled:opacity-30 transition-all text-xs cursor-pointer"
                      >
                        A-
                      </button>
                      <span class="text-sm font-bold text-blue-500">Level ${fontScaleIdx + 1}</span>
                      <button 
                        onClick=${increaseFont}
                        disabled=${fontScaleIdx === fontScaleStyles.length - 1}
                        class="px-4 py-2 bg-white dark:bg-neutral-700 text-gray-700 dark:text-gray-300 font-bold rounded-lg disabled:opacity-30 transition-all text-base cursor-pointer"
                      >
                        A+
                      </button>
                    </div>
                  </div>

                  <!-- Unified Disclosures Section (Reordered sequence: About -> How to Use -> Google Sheets Migration -> Sponsor -> Contact) -->
                  <div class="border-t border-gray-200 dark:border-neutral-800 pt-4 space-y-3">
                    <h4 class="font-bold text-xs uppercase tracking-wider text-gray-400 dark:text-neutral-500">Guides & Services</h4>
                    
                    <!-- [1] ABOUT -->
                    <div class="border-b border-gray-100 dark:border-neutral-800 pb-2">
                      <button onClick=${() => toggleDisclosure('about')} class="w-full flex justify-between items-center font-bold text-[0.85em] text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none cursor-pointer">
                        <span>${t.about}</span>
                        <span>${disclosureOpen['about'] ? '▲' : '▼'}</span>
                      </button>
                      ${disclosureOpen['about'] && html`
                        <div class="mt-2 leading-relaxed text-left text-[0.8em] text-gray-500 dark:text-gray-400 animate-fade-in space-y-2">
                          <p>Trading Risk Calculator is a premium, client-side trade assistant built specifically to enforce Volatility Contraction Pattern (VCP) risk sizing formulas and preserve capital safety.</p>
                          <p>© ${new Date().getFullYear()} Trading Risk Calculator. All Rights Reserved.</p>
                        </div>
                      `}
                    </div>

                    <!-- [2] HOW TO USE -->
                    <div class="border-b border-gray-100 dark:border-neutral-800 pb-2">
                      <button onClick=${() => toggleDisclosure('how')} class="w-full flex justify-between items-center font-bold text-[0.85em] text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none cursor-pointer">
                        <span>${t.howToUse}</span>
                        <span>${disclosureOpen['how'] ? '▲' : '▼'}</span>
                      </button>
                      ${disclosureOpen['how'] && html`
                        <div class="mt-2 leading-relaxed space-y-2 text-left text-[0.8em] text-gray-500 dark:text-gray-400 animate-fade-in">
                          <p>1. Enter your <strong>Total Portfolio Size</strong> and target <strong>Base Risk (1R %)</strong> under the Portfolio settings tab.</p>
                          <p>2. Go to the Calculator. Enter a <strong>Stock Code</strong> (like TSLA, 0005, or BTC) to auto-fetch pricing and load daily candle snapshots.</p>
                          <p>3. Choose <strong>Buy/Sell</strong> direction, input Entry Price and customize your Stop-Loss trigger.</p>
                          <p>4. Set Target Risk (R) slider and Profit reward boundaries. Add position setup to your active watchlist with custom strategy rationale.</p>
                          <p>5. Close trades inside Portfolio tab once active targets are reached to record realized statistics.</p>
                        </div>
                      `}
                    </div>

                    <!-- [3] GOOGLE SHEETS WEB APP SYNC MIGRATION -->
                    <div class="border-b border-gray-100 dark:border-neutral-800 pb-2">
                      <button onClick=${() => toggleDisclosure('gdrive')} class="w-full flex justify-between items-center font-bold text-[0.85em] text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none cursor-pointer">
                        <span class="flex items-center space-x-1.5">
                          <${CloudIcon} class="text-blue-500 w-4 h-4" />
                          <span>${t.googleDriveTitle}</span>
                        </span>
                        <span>${disclosureOpen['gdrive'] ? '▲' : '▼'}</span>
                      </button>
                      ${disclosureOpen['gdrive'] && html`
                        <div class="mt-3 space-y-4 text-left text-[0.8em] animate-fade-in">
                          <p class="text-xs text-gray-500 dark:text-neutral-400 leading-relaxed">${t.googleDriveDesc}</p>
                          
                          <div class="p-3 bg-blue-50 dark:bg-blue-900/10 rounded-xl border border-blue-500 border-opacity-30 space-y-2">
                            <div class="flex justify-between items-center">
                              <span class="text-[0.7rem] font-bold text-blue-800 dark:text-blue-300 uppercase">1. Apps Script Template</span>
                              <button onClick=${handleCopyScript} class="px-2 py-0.5 bg-gray-800 hover:bg-gray-700 text-gray-200 rounded text-[0.65rem] font-bold cursor-pointer">
                                ${copySuccess ? 'Copied!' : 'Copy'}
                              </button>
                            </div>
                            <textarea readOnly value=${GAS_TEMPLATE} class="w-full h-32 bg-gray-900 text-green-400 font-mono text-[0.65rem] p-2 rounded-lg focus:outline-none"></textarea>
                          </div>

                          <div class="p-3 bg-gray-50 dark:bg-neutral-800 rounded-xl border border-gray-100 dark:border-neutral-800 space-y-2">
                            <span class="text-[0.7rem] font-bold text-gray-700 dark:text-gray-300 uppercase">2. Deployment Web App URL</span>
                            <div class="flex items-center space-x-2">
                              <input 
                                type="text" 
                                value=${gdriveWebAppUrl} 
                                onChange=${(e) => setGdriveWebAppUrl(e.target.value)} 
                                placeholder="https://script.google.com/macros/s/.../exec" 
                                class="w-full bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-800 px-3 py-1.5 rounded-xl text-xs focus:outline-none focus:border-blue-500" 
                              />
                              <button onClick=${handleSaveWebAppUrl} class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-xs font-bold whitespace-nowrap cursor-pointer">Connect</button>
                            </div>
                          </div>

                          <div class="pt-1">
                            <button onClick=${pullTradesFromGoogleSheets} disabled=${!gdriveWebAppUrl} class="w-full bg-blue-500 hover:bg-blue-600 disabled:opacity-40 text-white font-bold py-2.5 rounded-xl transition-colors text-sm cursor-pointer">
                              ${t.googleLoginBtn}
                            </button>
                          </div>

                          ${syncStatus && html`
                            <div class="text-center text-xs font-semibold mt-1">
                              ${syncStatus === 'syncing' && html`<span class="text-blue-500 animate-pulse">Syncing...</span>`}
                              ${syncStatus === 'synced' && html`<span class="text-green-500 font-bold">Connected successfully ✓</span>`}
                              ${syncStatus === 'error' && html`<span class="text-red-500">Connection Error - Verify script URL</span>`}
                            </div>
                          `}
                        </div>
                      `}
                    </div>

                    <!-- [4] SPONSOR -->
                    <div class="border-b border-gray-100 dark:border-neutral-800 pb-2">
                      <button onClick=${() => toggleDisclosure('sponsor')} class="w-full flex justify-between items-center font-bold text-[0.85em] text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none cursor-pointer">
                        <span>${t.sponsor}</span>
                        <span>${disclosureOpen['sponsor'] ? '▲' : '▼'}</span>
                      </button>
                      ${disclosureOpen['sponsor'] && html`
                        <div class="mt-2 leading-relaxed text-left text-[0.8em] text-gray-500 dark:text-gray-400 animate-fade-in">
                          <p>Enjoy using this trading application? Support developer server endpoints, updates and real-time fetch protocols by sponsoring our open source roadmap.</p>
                          <div class="p-4 mt-4 bg-gray-50 dark:bg-neutral-800 rounded-xl border border-dashed border-gray-300 dark:border-neutral-700 text-center">
                            <p class="italic text-gray-400">[ Payment gateways placeholder ]</p>
                          </div>
                        </div>
                      `}
                    </div>

                    <!-- [5] CONTACT -->
                    <div class="pb-2">
                      <button onClick=${() => toggleDisclosure('contact')} class="w-full flex justify-between items-center font-bold text-[0.85em] text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none cursor-pointer">
                        <span>${t.footerContact}</span>
                        <span>${disclosureOpen['contact'] ? '▲' : '▼'}</span>
                      </button>
                      ${disclosureOpen['contact'] && html`
                        <div class="mt-2 leading-relaxed text-left text-[0.8em] text-gray-500 dark:text-gray-400 animate-fade-in">
                          <p>For custom API setups, private sheets bridges, and VCP workflow enquiries, please contact our support desk.</p>
                          <div class="p-4 mt-4 bg-gray-50 dark:bg-neutral-800 rounded-xl border border-dashed border-gray-300 dark:border-neutral-700 text-center">
                            <p class="italic text-gray-400">[ Inquiry portals placeholder ]</p>
                          </div>
                        </div>
                      `}
                    </div>
                  </div>
                </div>

              </div>
            </div>
          `}

          <!-- Clear All Confirmation Modal -->
          ${confirmClearAction && html`
            <div class="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick=${() => setConfirmClearAction(null)}>
               <div class="bg-white dark:bg-neutral-900 w-full max-sm rounded-2xl p-6 shadow-xl text-center shadow-2xl" onClick=${(e) => e.stopPropagation()}>
                  <h3 class="font-extrabold text-lg mb-4 text-red-500">Warning</h3>
                  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-6">Are you sure you want to permanently clear all ${confirmClearAction === 'trades' ? 'Active Trades' : 'History'}? This cannot be undone.</p>
                  <div class="flex gap-3">
                     <button onClick=${() => setConfirmClearAction(null)} class="flex-1 bg-gray-100 dark:bg-neutral-800 text-gray-700 dark:text-gray-300 font-bold py-3 rounded-xl text-sm cursor-pointer">Cancel</button>
                     <button onClick=${executeClearAction} class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl text-sm cursor-pointer">Confirm Clear</button>
                  </div>
               </div>
            </div>
          `}

          <!-- Custom iOS Overlay Sheet Modal for Position Closures -->
          ${closingTrade && html`
            <div class="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm z-50 flex items-end justify-center pb-safe-bottom" onClick=${() => setClosingTrade(null)}>
               <div class="bg-white dark:bg-neutral-900 w-full max-w-3xl rounded-t-3xl p-8 shadow-xl space-y-5 no-swipe" onClick=${(e) => e.stopPropagation()}>
                  <div class="flex justify-between items-center">
                    <h3 class="font-extrabold text-lg">${t.closeTradeTitle}</h3>
                    <span class="text-lg font-extrabold text-blue-500">${closingTrade.symbol}</span>
                  </div>

                  <div>
                     <label class="block text-sm font-semibold uppercase text-gray-400 dark:text-neutral-500 tracking-wider mb-2">${t.exitPriceLabel}</label>
                     <div class="relative">
                       <span class="absolute left-0 top-2 text-gray-400">$</span>
                       <input type="number" step="any" inputMode="decimal" value=${exitPriceInput} onChange=${(e) => setExitPriceInput(e.target.value)} class="w-full bg-transparent border-b-2 border-gray-200 dark:border-neutral-800 py-2 focus:outline-none focus:border-blue-500 font-bold text-xl pl-5" />
                     </div>
                  </div>

                  <div class="flex gap-3 pt-2">
                     <button onClick=${() => setClosingTrade(null)} class="flex-1 bg-gray-100 dark:bg-neutral-800 text-gray-600 dark:text-gray-300 font-bold py-3 rounded-xl text-sm cursor-pointer">${t.cancelBtn}</button>
                     <button onClick=${handleConfirmPositionClose} class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl text-sm cursor-pointer">${t.confirmCloseBtn}</button>
                  </div>
               </div>
            </div>
          `}
        </div>
      `;
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(React.createElement(App));
  </script>
</body>
</html>
