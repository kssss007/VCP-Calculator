    /* Prevent text selection flickering on quick iOS taps */
    button, input, select {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Strict container overrides for native app feel */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior-y: none;
      overscroll-behavior-x: none;
      overflow: hidden;
    }

    /* Hide scrollbars for the ribbon and internal panes */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Touch panning preference */
    .swipe-container {
      touch-action: pan-y;
    }

    /* iOS-like Custom Range Slider Track and Enlarge Control Point */
    input[type="range"] {
      -webkit-appearance: none;

      background: transparent;
      cursor: pointer;
      height: 28px; /* High touch target area */

    }

      background: #E5E5EA;

      border-radius: 4px;
    }

      background: #3A3A3C;

      -webkit-appearance: none;

      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #FFFFFF;

      margin-top: -9px;
      transition: transform 0.1s ease;
    }
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.15);

    const formatCommas = (value) => {
      if (value === null || value === undefined || value === '') return '';
      const cleanValue = value.toString().replace(/[^0-9.]/g, '');
      const parts = cleanValue.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');
    };

    const setCookieBackup = (name, value, days = 365) => {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax";
    };

    const getCookieBackup = (name) => {
      const cname = name + "=";
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf(cname) == 0) return c.substring(cname.length, c.length);
      }
      return "";
    };

      // Auto scroll ribbon active tab into central view when overflowed
      useEffect(() => {

        // Native feature: Set scroll view of incoming active tab back to top
        if (scrollPanesRefs.current[activeTab]) {
          scrollPanesRefs.current[activeTab].scrollTop = 0;
        }
      }, [activeTab]);

      const fetchPriceForSymbol = async (symbol) => {
        let parsedSymbol = symbol.trim().toUpperCase();
        if (!parsedSymbol) return null;
        
        let yahooSymbol = parsedSymbol;
        if (/^\d{4}$/.test(parsedSymbol)) {
          yahooSymbol = `${parsedSymbol}.HK`;
        } else if (['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE'].includes(parsedSymbol)) {
          yahooSymbol = `${parsedSymbol}-USD`;
        }

        const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${yahooSymbol}?interval=1m&range=1d`;
        
        try {
          const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`);
          if (res.ok) {
            const data = await res.json();
            const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price) return parseFloat(price);
          }
        } catch (e) {
          console.warn("Primary CORS proxy failed, falling back to AllOrigins...", e);
        }

        try {
          const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`);
          if (res.ok) {
            const data = await res.json();
            const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price) return parseFloat(price);
          }
        } catch (e) {
          console.error("All proxies failed to fetch quote for " + symbol, e);
        }
        return null;
      };

      const syncTradesToGoogleSheets = async () => {
        if (!gdriveSheetUrl) return;
        setSyncStatus('syncing');
        setTimeout(() => {
          setSyncStatus('synced');
        }, 1200);
      };

      const handleSaveSheetUrl = (val) => {
        setGdriveSheetUrl(val);
        localStorage.setItem('vcp_gdrive_sheet_url', val);
      };

      useEffect(() => {
        if (trades.length > 0 || history.length > 0) {
          syncTradesToGoogleSheets();
        }
      }, [trades, history]);

      useEffect(() => {
        const cached = localStorage.getItem('vcp_state') || getCookieBackup('vcp_state');
        if (cached) {
          try {
            const data = JSON.parse(cached);
            if (data.portfolioInput) setPortfolioInput(data.portfolioInput);
            if (data.rPercent) setRPercent(data.rPercent);
            if (data.trades && Array.isArray(data.trades)) setTrades(data.trades);
            if (data.history && Array.isArray(data.history)) setHistory(data.history);

        }
      }, []);

      const saveLocalData = (pIn, rPer, trds, hist) => {
        const payload = JSON.stringify({ portfolioInput: pIn, rPercent: rPer, trades: trds, history: hist });
        localStorage.setItem('vcp_state', payload);
        setCookieBackup('vcp_state', payload, 365);
      };

      const triggerSave = (newPortfolio, newRPercent, newTrades, newHistory) => {
        saveLocalData(newPortfolio, newRPercent, newTrades, newHistory);
      };

      const updatePortfolioValue = (newValue) => {
        setPortfolioInput(newValue);
        triggerSave(newValue, rPercent, trades, history);
      };

      const updateRPercentValue = (newValue) => {
        setRPercent(newValue);
        triggerSave(portfolioInput, newValue, trades, history);
      };

      const updateTradesList = (newTrades) => {
        const safeTrades = Array.isArray(newTrades) ? newTrades : [];
        setTrades(safeTrades);
        triggerSave(portfolioInput, rPercent, safeTrades, history);
      };

      const updateHistoryList = (newHistory) => {
        const safeHistory = Array.isArray(newHistory) ? newHistory : [];
        setHistory(safeHistory);
        triggerSave(portfolioInput, rPercent, trades, safeHistory);
      };

      const portfolio = useMemo(() => {
        const num = parseFloat(parseCommas(portfolioInput));
        return isNaN(num) ? 0 : num;
      }, [portfolioInput]);

      const handlePortfolioInputChange = (e) => {
        const raw = parseCommas(e.target.value);
        if (raw === '' || !isNaN(raw)) {
          updatePortfolioValue(formatCommas(raw));
        }
      };

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      useEffect(() => {
        const timer = setTimeout(() => {
          setDebouncedStockCode(stockCode.trim().toUpperCase());
        }, 800);
        return () => clearTimeout(timer);
      }, [stockCode]);

      useEffect(() => {
        const loadCalcPrice = async () => {
          if (!debouncedStockCode) return;
          setIsFetchingPrice(true);
          const price = await fetchPriceForSymbol(debouncedStockCode);
          if (price) {
            setEntry(price.toFixed(2));
          }
          setIsFetchingPrice(false);
        };
        loadCalcPrice();
      }, [debouncedStockCode]);

      const refreshPortfolioPrices = async () => {
        if (!trades || trades.length === 0) return;
        setPortfolioLoadingPrices(true);
        const uniqueSymbols = [...new Set(trades.map(t => t.symbol))];
        const newPrices = { ...livePrices };

        for (const sym of uniqueSymbols) {
          if (sym === 'UNKNOWN') continue;
          const price = await fetchPriceForSymbol(sym);
          if (price) {
            newPrices[sym] = price;
          }
        }
        setLivePrices(newPrices);
        setPortfolioLoadingPrices(false);
      };

      useEffect(() => {
        if (activeTab === 'port' && trades.length > 0) {
          refreshPortfolioPrices();
          const timer = window.setInterval(refreshPortfolioPrices, 30000); 
          return () => clearInterval(timer);
        }
      }, [activeTab, trades]);

      const handleTouchStart = (e) => {
        if (e.target.closest('input[type="range"]') || e.target.closest('#tv_chart_container') || e.target.closest('.no-swipe')) {
          return;
        }
        touchStartX.current = e.touches[0].clientX;
        setIsDragging(true);
      };

      const handleTouchMove = (e) => {
        if (!isDragging) return;
        touchCurrentX.current = e.touches[0].clientX;
        const diff = touchCurrentX.current - touchStartX.current;
        setDragOffset(diff);
      };

      const handleTouchEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        
        const threshold = window.innerWidth / 4; 
        if (dragOffset > threshold && activeTabIndex > 0) {
          setActiveTab(tabsOrder[activeTabIndex - 1]); 
        } else if (dragOffset < -threshold && activeTabIndex < tabsOrder.length - 1) {
          setActiveTab(tabsOrder[activeTabIndex + 1]); 
        }
        setDragOffset(0);
      };

      const oneR = portfolio * (parseFloat(rPercent) || 1) / 100;

      const slErrorMsg = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const rawVal = parseFloat(slValue) || 0;
        if (ePrice <= 0 || rawVal <= 0) return null;

        if (slMode === 'price') {
          if (tradeType === 'buy' && rawVal >= ePrice) return t.slErrorLong;
          if (tradeType === 'sell' && rawVal <= ePrice) return t.slErrorShort;
        }
        return null;
      }, [entry, slValue, slMode, tradeType, t]);

      const slCalc = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const rawVal = parseFloat(slValue) || 0;

        if (ePrice <= 0 || rawVal <= 0 || slErrorMsg) {
          return { price: 0, percent: 0, isValid: false };
        }

        if (slMode === 'price') {
          if (tradeType === 'buy') {
            const percent = ((ePrice - rawVal) / ePrice) * 100;
            return { price: rawVal, percent, isValid: true };
          } else { 
            const percent = ((rawVal - ePrice) / ePrice) * 100;
            return { price: rawVal, percent, isValid: true };
          }
        } else {
          if (rawVal >= 100) return { price: 0, percent: rawVal, isValid: false };
          if (tradeType === 'buy') {
            const price = ePrice * (1 - rawVal / 100);
            return { price, percent: rawVal, isValid: true };
          } else { 
            const price = ePrice * (1 + rawVal / 100);
            return { price, percent: rawVal, isValid: true };
          }
        }
      }, [entry, slValue, slMode, tradeType, slErrorMsg]);

      const rrRatioComputed = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const val = parseFloat(rrValue) || 0;
        const riskPerShare = slCalc.isValid ? Math.abs(ePrice - slCalc.price) : 0;

        if (ePrice <= 0 || riskPerShare <= 0 || val <= 0) {
          return { ratio: 2.0, targetPrice: 0, targetPercent: 0, isValid: false };
        }

        if (rrMode === 'ratio') {
          const targetPrice = tradeType === 'buy' ? ePrice + (riskPerShare * val) : ePrice - (riskPerShare * val);
          const targetPercent = (Math.abs(targetPrice - ePrice) / ePrice) * 100;
          return { ratio: val, targetPrice, targetPercent, isValid: true };
        } else if (rrMode === 'price') {
          if (tradeType === 'buy' && val <= ePrice) return { ratio: 0, targetPrice: val, targetPercent: 0, isValid: false };
          if (tradeType === 'sell' && val >= ePrice) return { ratio: 0, targetPrice: val, targetPercent: 0, isValid: false };
          const ratio = Math.abs(val - ePrice) / riskPerShare;
          const targetPercent = (Math.abs(val - ePrice) / ePrice) * 100;
          return { ratio, targetPrice: val, targetPercent, isValid: true };
        } else { 
          const targetPrice = tradeType === 'buy' ? ePrice * (1 + (val / 100)) : ePrice * (1 - (val / 100));
          const ratio = Math.abs(targetPrice - ePrice) / riskPerShare;
          return { ratio, targetPrice, targetPercent: val, isValid: true };
        }
      }, [entry, rrValue, rrMode, slCalc, tradeType]);

      const calculations = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        
        if (ePrice <= 0 || !slCalc.isValid || !rrRatioComputed.isValid || portfolio <= 0) {
          return { isValid: false, oneR };
        }

        const riskPerShare = Math.abs(ePrice - slCalc.price);
        const totalRiskAmount = oneR * riskR;
        
        const positionSize = Math.floor(totalRiskAmount / riskPerShare);
        const positionValue = positionSize * ePrice;
        
        const targetPrice = rrRatioComputed.targetPrice;
        const slPercentage = slCalc.percent;
        
        const scaleFirstShares = Math.floor(positionSize * firstBetMultiplier);
        const scaleFirstCap = scaleFirstShares * ePrice;
        const scaleRemainingShares = positionSize - scaleFirstShares;
        const scaleRemainingCap = scaleRemainingShares * ePrice;

        return {
          isValid: true,
          oneR, riskPerShare, totalRiskAmount, positionSize, positionValue, targetPrice, slPercentage,
          scaleFirstShares, scaleFirstCap, scaleRemainingShares, scaleRemainingCap
        };
      }, [portfolio, rPercent, entry, slCalc, riskR, rrRatioComputed, oneR, firstBetMultiplier]);

      const handleToggleSLMode = (newMode) => {
        if (newMode === slMode) return;
        const ePrice = parseFloat(entry) || 0;
        const currentVal = parseFloat(slValue) || 0;

        if (ePrice > 0 && currentVal > 0) {
          if (newMode === 'percent') {
            if (tradeType === 'buy' && currentVal < ePrice) {
              const p = (((ePrice - currentVal) / ePrice) * 100).toFixed(2);
              setSlValue(p);
            } else if (tradeType === 'sell' && currentVal > ePrice) {
              const p = (((currentVal - ePrice) / ePrice) * 100).toFixed(2);
              setSlValue(p);
            } else setSlValue('');
          } else {
            if (currentVal < 100) {
              const pr = tradeType === 'buy' 
                ? (ePrice * (1 - currentVal / 100)).toFixed(2)
                : (ePrice * (1 + currentVal / 100)).toFixed(2);
              setSlValue(pr);
            } else setSlValue('');
          }
        }
        setSlMode(newMode);
      };

      const handleToggleRRMode = (newMode) => {
        if (newMode === rrMode) return;
        if (rrRatioComputed.isValid) {
          if (newMode === 'ratio') setRrValue(rrRatioComputed.ratio.toFixed(2));
          else if (newMode === 'price') setRrValue(rrRatioComputed.targetPrice.toFixed(2));
          else setRrValue(rrRatioComputed.targetPercent.toFixed(2));
        } else setRrValue('');
        setRrMode(newMode);
      };

      const portfolioStats = useMemo(() => {
        const totalInvested = trades.reduce((sum, trade) => sum + trade.positionValue, 0);
        const totalRiskR = trades.reduce((sum, trade) => sum + trade.riskR, 0);
        const remainingCash = portfolio - totalInvested;
        const investedPercent = portfolio > 0 ? (totalInvested / portfolio) * 100 : 0;

        let netProfit = 0;
        trades.forEach(trade => {
          const livePrice = livePrices[trade.symbol];
          if (livePrice) {
            const isBuy = trade.type !== 'sell';
            const diff = isBuy ? (livePrice - trade.entry) : (trade.entry - livePrice);
            netProfit += diff * trade.shares;
          }
        });

        const realizedPnL = history.reduce((sum, h) => {
          const isBuy = h.type !== 'sell';
          const diff = isBuy ? (h.exitPrice - h.entry) : (h.entry - h.exitPrice);
          return sum + (diff * h.shares);
        }, 0);
        
        return { totalInvested, remainingCash, totalRiskR, investedPercent, netProfit, realizedPnL };
      }, [trades, history, portfolio, livePrices]);

      const handleAddTrade = () => {
        if (!calculations.isValid) return;
        const newTrade = {
          id: Date.now(),
          symbol: debouncedStockCode || 'UNKNOWN',
          type: tradeType,
          entry: parseFloat(entry),
          stopLoss: slCalc.price,
          target: calculations.targetPrice,
          shares: calculations.positionSize,
          positionValue: calculations.positionValue,
          riskR: riskR,
          rationale: rationale.trim(), 
        };
        updateTradesList([...trades, newTrade]);
        setRationale(''); 
        setActiveTab('port');
      };

      const handleClosePositionClick = (trade) => {
        setClosingTrade(trade);
        const currentLive = livePrices[trade.symbol];
        setExitPriceInput(currentLive ? currentLive.toFixed(2) : trade.entry.toFixed(2));
      };

      const handleConfirmPositionClose = () => {
        if (!closingTrade) return;
        const exitPr = parseFloat(exitPriceInput) || 0;
        
        const closedRecord = {
          ...closingTrade,
          exitPrice: exitPr,
          closedAt: Date.now()
        };

        const remainingActive = trades.filter(t => t.id !== closingTrade.id);
        const newHistory = [closedRecord, ...history];

        updateTradesList(remainingActive);
        updateHistoryList(newHistory);
        setClosingTrade(null);
        setActiveTab('history');
      };

      const removeTrade = (id) => updateTradesList(trades.filter(t => t.id !== id));
      const removeHistoryItem = (id) => updateHistoryList(history.filter(h => h.id !== id));

      const handleStartEditNote = (trade) => {
        setEditingTradeId(trade.id);
        setEditTradeNotes(trade.rationale || '');
      };

      const handleSaveInlineNote = (tradeId) => {
        const updatedTrades = trades.map(t => t.id === tradeId ? { ...t, rationale: editTradeNotes.trim() } : t);
        updateTradesList(updatedTrades);
        setEditingTradeId(null);
      };

      const getStopLossBtnClass = (mode) => {
        const base = "px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors cursor-pointer ";
        return base + (slMode === mode ? "bg-white dark:bg-gray-700 text-blue-500 shadow-sm" : "text-gray-500 hover:text-gray-700 dark:hover:text-gray-300");
      };

      const getRrBtnClass = (mode) => {
        const base = "px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors cursor-pointer ";
        return base + (rrMode === mode ? "bg-white dark:bg-gray-700 text-blue-500 shadow-sm" : "text-gray-500 hover:text-gray-700 dark:hover:text-gray-300");
      };

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      const toggleLang = () => setLang(prev => prev === 'en' ? 'zh' : 'en');
      const decreaseFont = () => setFontScaleIdx(prev => Math.max(0, prev - 1));
      const increaseFont = () => setFontScaleIdx(prev => Math.min(fontScaleStyles.length - 1, prev + 1));

      // Dynamic Risk Target Text
      const getRiskMessage = (r) => {
        if (r < 1.0) return { msg: t.riskTooSmall, color: 'text-yellow-500 dark:text-yellow-400' };
        if (r <= 2.0) return { msg: t.riskOptimal, color: 'text-green-600 dark:text-green-500' };
        return { msg: t.riskTooLarge, color: 'text-red-500' };
      };
      const riskInfo = getRiskMessage(riskR);

      useEffect(() => {
        if (!debouncedStockCode || !chartContainerRef.current) return;
        
        chartContainerRef.current.innerHTML = '';
        const script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/tv.js';
        script.async = true;
        script.onload = () => {
          if (window.TradingView) {
            let tvSymbol = debouncedStockCode;
            if (/^\d{4}$/.test(tvSymbol)) tvSymbol = `HKEX:${tvSymbol}`;
            else if (['BTC', 'ETH', 'SOL', 'XRP'].includes(tvSymbol)) tvSymbol = `BINANCE:${tvSymbol}USDT`;

            new window.TradingView.widget({
              autosize: true,
              symbol: tvSymbol,
              interval: interval,
              timezone: "Etc/UTC",
              theme: theme,
              style: "1",
              locale: lang === 'zh' ? 'zh_TW' : 'en',
              enable_publishing: false,
              hide_top_toolbar: true,
              hide_legend: false,
              save_image: false,
              container_id: chartContainerRef.current.id,
            });
          }
        };
        document.head.appendChild(script);

        return () => {
          if (chartContainerRef.current) chartContainerRef.current.innerHTML = '';
        };
      }, [debouncedStockCode, interval, theme]);

      const activeFontSizeStyle = fontScaleStyles[fontScaleIdx];
      const iOSInputClass = `w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors text-[1.1em]`;
      const iOSCardClass = `bg-white dark:bg-[#1C1C1E] rounded-2xl p-[1.5em] shadow-sm mb-[1.5em] transition-colors relative z-0`;

      return html`
        <div 
          style=${{ fontSize: activeFontSizeStyle }} 
          class="flex-1 w-full flex flex-col bg-iosBgLight dark:bg-iosBgDark text-gray-900 dark:text-white font-sans overflow-hidden"
        >
          
          <!-- Top Sticky iOS Navigation Ribbon with Responsive Centered Gradient View -->
          <nav class="shrink-0 z-50 bg-[#F2F2F7]/80 dark:bg-[#000000]/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-900 no-swipe">
            <div class="max-w-4xl mx-auto px-[1em] h-[3.75em] flex items-center justify-between w-full">
              
              <!-- Left Controls -->
              <div class="flex-1 flex justify-start items-center">
                 <div class="flex items-center bg-gray-200/50 dark:bg-gray-800/50 rounded-full px-[0.4em] py-[0.15em]">
                    <button onClick=${decreaseFont} class="p-[0.25em] px-[0.5em] text-[0.8em] font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === 0}>A</button>
                    <div class="w-px h-[0.9em] bg-gray-400/30 mx-[0.2em]"></div>
                    <button onClick=${increaseFont} class="p-[0.2em] px-[0.4em] text-[1.1em] font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === fontScaleStyles.length - 1}>A</button>
                 </div>
              </div>
              
              <!-- Center: Dynamically Paged Ribbon -->
              <div class="flex-shrink-0 flex justify-center items-center w-[55%] sm:w-auto relative max-w-[60vw]">
                <!-- Edges fading effect -->
                <div class="absolute left-0 top-0 bottom-0 w-4 sm:w-6 bg-gradient-to-r from-[#F2F2F7] dark:from-black to-transparent z-10 pointer-events-none"></div>
                <div class="absolute right-0 top-0 bottom-0 w-4 sm:w-6 bg-gradient-to-l from-[#F2F2F7] dark:from-black to-transparent z-10 pointer-events-none"></div>
                
                <!-- Ribbon Container -->
                <div 
                  ref=${ribbonContainerRef} 
                  class="flex bg-gray-200/50 dark:bg-[#1C1C1E] p-[0.15em] rounded-xl shadow-inner text-[0.8em] border border-gray-300/30 dark:border-gray-800 overflow-x-auto snap-x snap-mandatory hide-scrollbar relative z-0 w-full"
                >
                  ${tabsOrder.map((tabId) => html`
                    <button 
                      key=${tabId}
                      ref=${el => tabButtonRefs.current[tabId] = el}
                      onClick=${() => setActiveTab(tabId)}
                      class=${`snap-center shrink-0 px-[1em] sm:px-[1.75em] py-[0.35em] rounded-lg font-bold transition-all flex items-center space-x-[0.25em] ${activeTab === tabId ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
                    >
                      ${tabId === 'calc' ? html`<${CalculatorIcon} /><span>${t.calcTab}</span>` : 
                        tabId === 'port' ? html`<${BriefcaseIcon} /><span>${t.portTab}</span>` : 
                        html`<${HistoryIcon} /><span>${t.historyTab}</span>`}
                    </button>
                  `)}
                </div>
              </div>

              <!-- Right Controls -->
              <div class="flex-1 flex justify-end items-center space-x-[0.25em]">
                <button onClick=${toggleLang} class="p-[0.4em] rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  <${GlobeIcon} />
                </button>
                <button onClick=${toggleTheme} class="p-[0.4em] rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  ${theme === 'light' ? html`<${MoonIcon} />` : html`<${SunIcon} />`}
                </button>
              </div>
            </div>
          </nav>

          <!-- Smooth Swiping Independent Viewport Container -->
          <main class="flex-1 w-full relative overflow-hidden swipe-container">
             <div 
               class=${`flex w-[300%] h-full ${isDragging ? '' : 'transition-transform duration-300 ease-out'}`}
               style=${{ transform: `translateX(calc(${-activeTabIndex * 33.333}% + ${dragOffset}px))` }}
               onTouchStart=${handleTouchStart}
               onTouchMove=${handleTouchMove}
               onTouchEnd=${handleTouchEnd}
             >
                
                <!-- CALCULATOR PANE -->
                <div class="w-[33.333%] h-full overflow-y-auto hide-scrollbar px-[1em] pt-[1.5em] pb-[4em]" ref=${el => scrollPanesRefs.current['calc'] = el}>
                  <div class="max-w-3xl mx-auto">
                    
                    <div class="flex justify-between items-center mb-[1em] px-[0.5em] text-[0.875em] text-gray-500 dark:text-gray-400">
                      <span>${t.portfolioSize}: <strong class="text-gray-800 dark:text-gray-200">$${portfolio.toLocaleString()}</strong></span>
                      <span class="text-[0.75em] font-semibold px-[0.75em] py-[0.25em] rounded-full bg-blue-100 text-blue-800 dark:bg-blue-950 dark:text-blue-300">
                        ${gdriveSheetUrl ? t.cloudSyncing : t.localMode}
                      </span>
                      <span>1R = <strong class="text-blue-500">$${oneR.toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong></span>
                    </div>

                    <div class=${iOSCardClass}>
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-[1.5em] items-end">
                        <div class="col-span-1 md:col-span-2">
                          <label class="block text-[0.875em] font-semibold text-gray-500 dark:text-gray-400 mb-[0.5em] uppercase tracking-wider flex justify-between">
                            ${t.stockCode}
                            ${isFetchingPrice && html`<span class="text-blue-400 normal-case text-[0.75em] flex items-center"><${ActivityIcon} class="mr-[0.25em] animate-pulse" /> ${t.fetchingPrice}</span>`}
                          </label>
                          <div class="relative no-swipe">
                            <input type="text" value=${stockCode} onChange=${(e) => setStockCode(e.target.value)} class=${`${iOSInputClass} font-bold uppercase`} placeholder="AAPL" autoCapitalize="characters" autoComplete="off" spellCheck="false" />
                            <${ChartIcon} class="absolute right-[0.5em] top-[0.5em] text-gray-400 pointer-events-none" />
                          </div>
                        </div>

                        <div class="flex flex-col justify-between h-full">
                          <div class="flex justify-between items-center mb-[0.5em] h-[1.8em]">
                            <label class="block text-[0.875em] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${t.entryPrice}</label>
                            <div class="flex bg-gray-200 dark:bg-gray-800 p-[0.125em] rounded-lg text-[0.75em] no-swipe">
                              <button type="button" onClick=${() => setTradeType('buy')} class=${`px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors ${tradeType === 'buy' ? 'bg-green-500 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>${t.directionBuy}</button>
                              <button type="button" onClick=${() => setTradeType('sell')} class=${`px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors ${tradeType === 'sell' ? 'bg-red-500 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>${t.directionSell}</button>
                            </div>
                          </div>
                          <div class="relative no-swipe">
                            <span class="absolute left-0 top-[0.5em] text-gray-400 font-medium">$</span>
                            <input type="number" step="any" inputMode="decimal" value=${entry} onChange=${(e) => setEntry(e.target.value)} class=${`${iOSInputClass} pl-[1.25em]`} placeholder="150.00" />
                          </div>
                        </div>

                        <div class="flex flex-col justify-between h-full">
                          <div class="flex justify-between items-center mb-[0.5em] h-[1.8em]">
                            <label class="block text-[0.875em] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${t.stopLoss}</label>
                            <div class="flex bg-gray-200 dark:bg-gray-800 p-[0.125em] rounded-lg text-[0.75em] no-swipe">
                              <button type="button" onClick=${() => handleToggleSLMode('price')} class=${getStopLossBtnClass('price')}>${t.stopLossModePrice}</button>
                              <button type="button" onClick=${() => handleToggleSLMode('percent')} class=${getStopLossBtnClass('percent')}>${t.stopLossModePercent}</button>
                            </div>
                          </div>

                          <div class="relative no-swipe">
                            <span class="absolute left-0 top-[0.5em] text-gray-400 font-medium">${slMode === 'price' ? '$' : '%'}</span>
                            <input type="number" step="any" inputMode="decimal" value=${slValue} onChange=${(e) => setSlValue(e.target.value)} class=${`${iOSInputClass} pl-[1.25em]`} placeholder=${slMode === 'price' ? (tradeType === 'buy' ? '140.00' : '160.00') : '5.00'} />
                          </div>

                          ${slErrorMsg ? html`
                            <div class="mt-[0.5em] text-[0.75em] text-red-500 font-medium">
                              <${AlertIcon} class="inline mr-1 mb-1" /> ${slErrorMsg}
                            </div>
                          ` : (slCalc.isValid && html`
                            <div class="mt-[0.5em] text-[0.75em] text-gray-400 dark:text-gray-500">
                              <span>${slMode === 'price' ? html`Calculated Percentage: <strong>-${slCalc.percent.toFixed(2)}%</strong>` : html`Calculated Price: <strong>$${slCalc.price.toFixed(2)}</strong>`}</span>
                            </div>

                                 <div class="flex sm:flex-col gap-2 w-full sm:w-auto">
                                   <button onClick=${() => handleClosePositionClick(trade)} class="flex-1 sm:flex-initial bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-[1em] py-[0.5em] rounded-xl text-[0.875em] cursor-pointer">${t.closeTradeBtn}</button>
                                   <button onClick=${() => removeTrade(trade.id)} class="p-[0.5em] text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors flex justify-center items-center cursor-pointer"><${TrashIcon} /></button>
                                 </div>
                               </div>
                             `;
                           })}
                         </div>
                       `}
                    </div>

                    <div class=${iOSCardClass}>
                      <div class="flex items-center justify-between mb-[0.75em]">
                        <div class="flex items-center space-x-[0.5em]">
                           <${CloudIcon} class="text-blue-500" />
                           <h3 class="font-bold text-gray-800 dark:text-gray-200 text-[1em]">${t.googleDriveTitle}</h3>
                        </div>
                        <button onClick=${() => setShowGdriveConfig(!showGdriveConfig)} class="text-[0.875em] text-blue-500 hover:text-blue-600 font-medium focus:outline-none">
                          ${showGdriveConfig ? 'Hide Config' : 'Configuration ⚙'}
                        </button>
                      </div>
                      <p class="text-[0.875em] text-gray-500 dark:text-gray-400 mb-[1.25em]">${t.googleDriveDesc}</p>
                      
                      ${showGdriveConfig && html`
                        <div class="mb-4 p-4 bg-gray-50 dark:bg-black/30 rounded-xl border border-gray-100 dark:border-gray-800/50 space-y-3 no-swipe">
                          <p class="text-[0.8em] text-gray-400 leading-relaxed">${t.googleInstructions}</p>
                          <div>
                            <label class="block text-[0.75em] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">${t.googleSheetLinkLabel}</label>
                            <input type="text" value=${gdriveSheetUrl} onChange=${(e) => handleSaveSheetUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/.../edit" class="w-full bg-white dark:bg-black/50 border border-gray-200 dark:border-gray-800 px-[0.75em] py-[0.5em] rounded-xl text-[0.875em] focus:outline-none focus:border-blue-500" />
                          </div>
                        </div>
                      `}
                      <div class="space-y-[0.75em] no-swipe">
                        <button onClick=${syncTradesToGoogleSheets} disabled=${!gdriveSheetUrl} class="w-full bg-blue-500 hover:bg-blue-600 disabled:opacity-40 text-white font-bold py-[0.75em] rounded-xl transition-colors text-[0.95em]">
                          ${t.googleLoginBtn}
                        </button>
                        ${syncStatus && html`
                          <div class="text-center text-[0.825em] font-semibold mt-[0.5em]">
                            ${syncStatus === 'syncing' && html`<span class="text-blue-500 animate-pulse">Syncing Google Sheets...</span>`}
                            ${syncStatus === 'synced' && html`<span class="text-green-500">Google Sheets Connection Synced ✓</span>`}
                            ${syncStatus === 'error' && html`<span class="text-red-500">Connection Error</span>`}
                          </div>
                        `}
                      </div>
                    </div>
                  </div>
                </div>

                <!-- HISTORY PANE -->
                <div class="w-[33.333%] h-full overflow-y-auto hide-scrollbar px-[1em] pt-[1.5em] pb-[4em]" ref=${el => scrollPanesRefs.current['history'] = el}>
                  <div class="max-w-3xl mx-auto">
                    <div class="bg-white dark:bg-[#1C1C1E] rounded-2xl p-[1.5em] shadow-sm border-l-4 mb-[1.5em] ${portfolioStats.realizedPnL >= 0 ? 'border-green-500' : 'border-red-500'}">
                       <span class="block text-xs uppercase font-semibold text-gray-500 tracking-wider">${t.realizedPnL}</span>
                       <div class=${`font-bold text-[1.75em] ${portfolioStats.realizedPnL >= 0 ? 'text-green-500' : 'text-red-500'}`}>${portfolioStats.realizedPnL >= 0 ? '+' : ''}$${portfolioStats.realizedPnL.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    </div>

                    <div class=${`${iOSCardClass} p-0 overflow-hidden`}>
                       <div class="p-[1em] border-b border-gray-100 dark:border-gray-800">
                         <h3 class="font-bold text-gray-800 dark:text-gray-200 text-[1em]">${t.historyTab}</h3>
                       </div>

                       ${history.length === 0 ? html`
                         <div class="p-[2em] text-center text-gray-500 dark:text-gray-400 text-[0.9em]">${t.noHistory}</div>
                       ` : html`
                         <div class="divide-y divide-gray-100 dark:divide-gray-800">
                           ${history.map(item => {
                             const isBuy = item.type !== 'sell';
                             const tradeProfit = (isBuy ? (item.exitPrice - item.entry) : (item.entry - item.exitPrice)) * item.shares;
                             const profitPercent = ((isBuy ? (item.exitPrice - item.entry) : (item.entry - item.exitPrice)) / item.entry) * 100;

                             return html`
                               <div key=${item.id} class="p-[1.25em] flex items-center justify-between hover:bg-gray-50 dark:hover:bg-[#252528] transition-colors">
                                 <div class="flex-1 min-w-0 pr-4">
                                   <div class="font-bold text-[1.1em] mb-[0.25em] flex flex-wrap items-center gap-[0.5em]">
                                     <span class=${item.type === 'sell' ? 'text-red-500' : 'text-green-500'}>${item.type === 'sell' ? 'SHORT' : 'LONG'}</span>
                                     <span class="font-extrabold text-gray-800 dark:text-gray-200">${item.symbol}</span>
                                     <span class="text-[0.7em] px-[0.5em] py-[0.2em] bg-gray-100 text-gray-800 rounded-md">${item.shares.toLocaleString()} shares | ${formatR(item.riskR)}R</span>
                                     <span class=${`text-[0.7em] px-[0.5em] py-[0.2em] rounded-md font-bold ${tradeProfit >= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>Profit: ${tradeProfit >= 0 ? '+' : ''}$${tradeProfit.toFixed(2)} (${tradeProfit >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)</span>
                                   </div>
                                   <div class="text-[0.875em] text-gray-500 dark:text-gray-400 grid grid-cols-2 gap-x-[1.5em] gap-y-[0.1em]">
                                     <span>Entry: $${item.entry.toFixed(2)}</span>
                                     <span>Exit: $${item.exitPrice.toFixed(2)}</span>
                                     <span>SL: $${item.stopLoss.toFixed(2)}</span>
                                     <span>Closed: ${new Date(item.closedAt).toLocaleDateString()}</span>
                                   </div>
                                   ${item.rationale && html`<div class="mt-2 text-[0.8em] text-gray-400 italic">Notes: ${item.rationale}</div>`}
                                 </div>
                                 <button onClick=${() => removeHistoryItem(item.id)} class="p-[0.75em] text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors flex-shrink-0"><${TrashIcon} /></button>
                               </div>
                             `;
                           })}
                         </div>
                       `}
                    </div>
                  </div>
                </div>

             </div>
          </main>

          <!-- Custom iOS Overlay Sheet Modal for Position Closures -->
          ${closingTrade && html`
            <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end justify-center pb-safe-bottom" onClick=${() => setClosingTrade(null)}>
               <div class="bg-white dark:bg-[#1C1C1E] w-full max-w-3xl rounded-t-3xl p-[2em] shadow-xl space-y-[1.25em]" onClick=${(e) => e.stopPropagation()}>
                  <div class="flex justify-between items-center">
                    <h3 class="font-extrabold text-[1.125em]">${t.closeTradeTitle}</h3>
                    <span class="text-[1.125em] font-extrabold text-blue-500">${closingTrade.symbol}</span>
                  </div>

                  <div>
                     <label class="block text-[0.8em] font-semibold uppercase text-gray-400 tracking-wider mb-2">${t.exitPriceLabel}</label>
                     <div class="relative no-swipe">
                       <span class="absolute left-0 top-[0.5em] text-gray-400">$</span>
                       <input type="number" step="any" inputMode="decimal" value=${exitPriceInput} onChange=${(e) => setExitPriceInput(e.target.value)} class="w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 py-2 focus:outline-none focus:border-blue-500 font-bold text-[1.25em] pl-[1.25em]" />
                     </div>
                  </div>

                  <div class="flex gap-3 pt-2">
                     <button onClick=${() => setClosingTrade(null)} class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold py-[0.75em] rounded-xl text-[0.95em]">${t.cancelBtn}</button>
                     <button onClick=${handleConfirmPositionClose} class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-[0.75em] rounded-xl text-[0.95em]">${t.confirmCloseBtn}</button>
                  </div>
               </div>
            </div>
          `}
        </div>
      `;
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(React.createElement(App));
  </script>
</body>
</html>
