<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VCP Risk Calculator</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            iosBgLight: '#F2F2F7',
            iosBgDark: '#000000',
            iosCardLight: '#FFFFFF',
            iosCardDark: '#1C1C1E',
          }
        }
      }
    }
  </script>

  <style>
    /* Prevent text selection flickering on quick iOS taps */
    button, input, select {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* iOS-like Custom Range Slider Track and Enlarge Control Point */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      height: 28px; /* High touch target area */
      width: 100%;
    }

    /* Webkit (Safari, Chrome, iOS Safari) Customizations */
    input[type="range"]::-webkit-slider-runnable-track {
      background: #E5E5EA;
      height: 8px;
      border-radius: 4px;
    }
    .dark input[type="range"]::-webkit-slider-runnable-track {
      background: #3A3A3C;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 26px; /* Enlarge control point */
      height: 26px; /* Enlarge control point */
      border-radius: 50%;
      background: #FFFFFF;
      border: 0.5px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.12), 0px 3px 1px rgba(0, 0, 0, 0.04);
      margin-top: -9px; /* Align to center with track */
      transition: transform 0.1s ease;
    }
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.15); /* Feedback on touch */
    }

    /* Mozilla Firefox Customizations */
    input[type="range"]::-moz-range-track {
      background: #E5E5EA;
      height: 8px;
      border-radius: 4px;
    }
    .dark input[type="range"]::-moz-range-track {
      background: #3A3A3C;
    }
    input[type="range"]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 0.5px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.12), 0px 3px 1px rgba(0, 0, 0, 0.04);
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-iosBgLight dark:bg-iosBgDark text-gray-900 dark:text-white transition-colors duration-300">
  <div id="root"></div>

  <!-- Load React, ReactDOM and HTM via Native ES Modules -->
  <script type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import htm from 'https://esm.sh/htm@3.1.1';

    // Bind htm to React's createElement to write JSX-like syntax using template literals
    const html = htm.bind(React.createElement);

    // --- Localization Dictionary ---
    const translations = {
      en: {
        title: "VCP Risk Calculator",
        calcTab: "Calculator",
        portTab: "Portfolio",
        portfolioSize: "Total Portfolio Size",
        baseRisk: "Base Risk (1R % of Portfolio)",
        stockCode: "Stock Code (e.g. AAPL, 0700, BTC)",
        entryPrice: "Entry Price",
        stopLoss: "Stop Loss",
        targetRisk: "Target Risk (R)",
        rrRatio: "Risk-to-Reward Ratio (R:R)",
        chartTabs: { W: "Weekly", D: "Daily", "60": "1-Hour", "5": "5-Min" },
        tradePlan: "Trade Plan & Results",
        positionSize: "Position Size (Shares/Coins)",
        capitalRequired: "Market Exposure (Capital)",
        remainingCash: "Remaining Account Value",
        targetPrice: "Target Price",
        firstBet: "1st Bet Size (0.3R - 0.5R)",
        scaleInTitle: "Progressive Scale-in (1st Bet)",
        secondBet: "2nd Bet (Confirmation)",
        rulesSummary: "Strategy Rules Checklist",
        rule1: "1R = Set % of Portfolio (Default 1%)",
        rule2: "Max Exposure = 10R",
        rule3: "Max Risk/Trade = 2R",
        rule4: "Stop Loss < 10% from Entry",
        slWarning: "Warning: Stop Loss is > 10% below entry!",
        slGood: "Stop Loss is within 10% limit.",
        invalidInput: "Enter valid Entry and Stop Loss to calculate",
        avgUpOnly: "Rule: Only average up, never average down.",
        maxRiskWarning: "Exceeds 2R limit!",
        chartPlaceholder: "Enter a stock code to view chart",
        addToPortfolio: "Add Trade to Portfolio",
        activeTrades: "Active Trades",
        noTrades: "No active trades in portfolio.",
        totalExposure: "Total Exposure (In-Market Capital)",
        riskThermometer: "Live Risk Thermometer (Max 10R)",
        fetchingPrice: "Fetching Live Price (TradingView feed)...",
      },
      zh: {
        title: "VCP 風險管理",
        calcTab: "計算機",
        portTab: "投資組合",
        portfolioSize: "總資金 (Total Portfolio Size)",
        baseRisk: "基礎風險 (1R 佔總資金 %)",
        stockCode: "股票代號 (例: AAPL, 0700, BTC)",
        entryPrice: "買入價 (Entry Price)",
        stopLoss: "止蝕價 (Stop Loss)",
        targetRisk: "目標風險 (Target Risk - R)",
        rrRatio: "風險回報比 (Risk-to-Reward Ratio - R:R)",
        chartTabs: { W: "週線", D: "日線", "60": "1小時", "5": "5分鐘" },
        tradePlan: "交易計畫與結果",
        positionSize: "倉位大小 (股/數量)",
        capitalRequired: "投入市場資金 (Capital)",
        remainingCash: "剩餘帳戶資金",
        targetPrice: "目標獲利價",
        firstBet: "首注大小 (0.3R - 0.5R)",
        scaleInTitle: "漸進式建倉 (首注)",
        secondBet: "次注 (確認突破後加注)",
        rulesSummary: "策略規則檢查 Checklist",
        rule1: "1R = 自訂總資金比例 (預設 1%)",
        rule2: "最大總市場曝險 = 10R",
        rule3: "單筆最大風險限制 = 2R",
        rule4: "止蝕位需在買入價 10% 以內",
        slWarning: "警告：止蝕幅度大於買入價的 10%！",
        slGood: "止蝕幅度在 10% 安全範圍內。",
        invalidInput: "請輸入有效的買入價與止蝕價以進行計算",
        avgUpOnly: "規則：只在獲利時加倉 (Average up)，絕不向下攤平。",
        maxRiskWarning: "已超過建議的 2R 上限！",
        chartPlaceholder: "輸入股票代號以顯示圖表",
        addToPortfolio: "加入投資組合",
        activeTrades: "持有倉位",
        noTrades: "投資組合目前無倉位。",
        totalExposure: "總持倉曝險 (Total Exposure - Capital)",
        riskThermometer: "實時風險溫度計 (上限 10R)",
        fetchingPrice: "正在獲取最新報價 (TradingView 數據源)...",
      }
    };

    const fontScales = [
      'text-xs sm:text-sm',     // 0
      'text-sm sm:text-base',   // 1
      'text-base sm:text-lg',   // 2 (Default)
      'text-lg sm:text-xl',     // 3
      'text-xl sm:text-2xl'     // 4
    ];

    // Helper functions for Thousand Separator formatting
    const formatCommas = (value) => {
      if (value === null || value === undefined || value === '') return '';
      const cleanValue = value.toString().replace(/[^0-9.]/g, '');
      const parts = cleanValue.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');
    };

    const parseCommas = (str) => {
      return str.replace(/,/g, '');
    };

    // --- Elegant Custom SVGs replacing Lucide Icons ---
    const MoonIcon = () => html`<svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>`;
    const SunIcon = () => html`<svg class="w-5 h-5 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>`;
    const GlobeIcon = () => html`<svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>`;
    const InfoIcon = ({ className }) => html`<svg class=${`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
    const AlertIcon = ({ className }) => html`<svg class=${`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
    const TrendingIcon = ({ className }) => html`<svg class=${`w-4 h-4 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>`;
    const ChartIcon = ({ className }) => html`<svg class=${`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>`;
    const BriefcaseIcon = ({ className }) => html`<svg class=${`w-4 h-4 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>`;
    const CalculatorIcon = ({ className }) => html`<svg class=${`w-4 h-4 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 11h.01M12 7h.01M9 11h.01M15 11h.01M15 7h.01M5 19V5a2 2 0 012-2h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2z" /></svg>`;
    const PlusIcon = ({ className }) => html`<svg class=${`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>`;
    const TrashIcon = ({ className }) => html`<svg class=${`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
    const ActivityIcon = ({ className }) => html`<svg class=${`w-3 h-3 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`;

    function App() {
      const [lang, setLang] = useState('en');
      const [theme, setTheme] = useState('light');
      const [fontScaleIdx, setFontScaleIdx] = useState(2);
      const [activeTab, setActiveTab] = useState('calc'); 
      
      // Portfolio States (With input formatting)
      const [portfolioInput, setPortfolioInput] = useState("100,000");
      const [rPercent, setRPercent] = useState(1.0); 
      const [trades, setTrades] = useState([]); 
      
      // Calculator States
      const [stockCode, setStockCode] = useState('');
      const [debouncedStockCode, setDebouncedStockCode] = useState('');
      const [isFetchingPrice, setIsFetchingPrice] = useState(false);
      const [entry, setEntry] = useState('');
      const [stopLoss, setStopLoss] = useState('');
      const [riskR, setRiskR] = useState(1.0); 
      const [rrRatio, setRrRatio] = useState(2.0);
      const [interval, setInterval] = useState('D');

      const chartContainerRef = useRef(null);
      const t = translations[lang];

      // Parse current active numeric value of portfolio
      const portfolio = useMemo(() => {
        const num = parseFloat(parseCommas(portfolioInput));
        return isNaN(num) ? 0 : num;
      }, [portfolioInput]);

      const handlePortfolioInputChange = (e) => {
        const raw = parseCommas(e.target.value);
        if (raw === '' || !isNaN(raw)) {
          setPortfolioInput(formatCommas(raw));
        }
      };

      // Native Theme Class Handler
      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [theme]);

      // Debounce stock code input
      useEffect(() => {
        const timer = setTimeout(() => {
          setDebouncedStockCode(stockCode.trim().toUpperCase());
        }, 800);
        return () => clearTimeout(timer);
      }, [stockCode]);

      // --- TradingView Data Feed Implementation ---
      useEffect(() => {
        const fetchTradingViewPrice = async () => {
          if (!debouncedStockCode) return;
          setIsFetchingPrice(true);
          
          let parsedSymbol = debouncedStockCode;
          let exchange = "NASDAQ"; // Default fallback

          // Rule based exchange routing for TradingView format
          if (/^\d{4}$/.test(parsedSymbol)) {
            exchange = "HKEX";
            parsedSymbol = `${parsedSymbol}`;
          } else if (['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE'].includes(parsedSymbol)) {
            exchange = "BINANCE";
            parsedSymbol = `${parsedSymbol}USDT`;
          }

          try {
            const queryUrl = `https://symbols-trader.tradingview.com/symbols?symbol=${exchange}:${parsedSymbol}`;
            const response = await fetch(queryUrl);
            if (response.ok) {
              const data = await response.json();
              if (data && data.length > 0) {
                const tvPrice = data[0].price || data[0].last_price || data[0].lp;
                if (tvPrice) {
                  setEntry(Number(tvPrice).toFixed(2));
                  setIsFetchingPrice(false);
                  return;
                }
              }
            }
          } catch (e) {
            console.warn("Primary TV endpoint failed, using high-speed backup feed...", e);
          }

          // High-speed Backup Feed
          try {
            let backupSymbol = debouncedStockCode;
            if (/^\d{4}$/.test(backupSymbol)) backupSymbol += '.HK';
            else if (['BTC', 'ETH', 'SOL', 'XRP'].includes(backupSymbol)) backupSymbol += '-USD';

            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${backupSymbol}?interval=1m&range=1d`)}`);
            if (response.ok) {
              const data = await response.json();
              const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
              if (price) {
                setEntry(Number(price).toFixed(2));
              }
            }
          } catch (error) {
            console.error("Backup feed failed too: ", error);
          } finally {
            setIsFetchingPrice(false);
          }
        };

        fetchTradingViewPrice();
      }, [debouncedStockCode]);

      // --- Render TradingView Snapshot Chart ---
      useEffect(() => {
        if (activeTab !== 'calc' || !debouncedStockCode || !chartContainerRef.current) return;
        
        chartContainerRef.current.innerHTML = '';
        const script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/tv.js';
        script.async = true;
        script.onload = () => {
          if (window.TradingView) {
            let tvSymbol = debouncedStockCode;
            if (/^\d{4}$/.test(tvSymbol)) tvSymbol = `HKEX:${tvSymbol}`;
            else if (['BTC', 'ETH', 'SOL', 'XRP'].includes(tvSymbol)) tvSymbol = `BINANCE:${tvSymbol}USDT`;

            new window.TradingView.widget({
              autosize: true,
              symbol: tvSymbol,
              interval: interval,
              timezone: "Etc/UTC",
              theme: theme,
              style: "1",
              locale: lang === 'zh' ? 'zh_TW' : 'en',
              enable_publishing: false,
              hide_top_toolbar: true,
              hide_legend: false,
              save_image: false,
              container_id: chartContainerRef.current.id,
            });
          }
        };
        chartContainerRef.current.appendChild(script);

        return () => {
          if (chartContainerRef.current) chartContainerRef.current.innerHTML = '';
        };
      }, [debouncedStockCode, interval, theme, activeTab]); 

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      const toggleLang = () => setLang(prev => prev === 'en' ? 'zh' : 'en');
      const decreaseFont = () => setFontScaleIdx(prev => Math.max(0, prev - 1));
      const increaseFont = () => setFontScaleIdx(prev => Math.min(fontScales.length - 1, prev + 1));

      // Base Risk (1R) Calculation
      const oneR = portfolio * (parseFloat(rPercent) || 1) / 100;

      // Active Calculator Calculations
      const calculations = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const slPrice = parseFloat(stopLoss) || 0;
        
        if (ePrice <= 0 || slPrice <= 0 || slPrice >= ePrice || portfolio <= 0) {
          return { isValid: false, oneR };
        }

        const riskPerShare = ePrice - slPrice;
        const totalRiskAmount = oneR * riskR;
        
        const positionSize = Math.floor(totalRiskAmount / riskPerShare);
        const positionValue = positionSize * ePrice;
        
        const targetPrice = ePrice + (riskPerShare * rrRatio);
        const slPercentage = ((riskPerShare) / ePrice) * 100;
        
        const scale03Shares = Math.floor(positionSize * 0.3);
        const scale04Shares = Math.floor(positionSize * 0.4);
        const scale05Shares = Math.floor(positionSize * 0.5);
        const scale03Cap = scale03Shares * ePrice;
        const scale04Cap = scale04Shares * ePrice;
        const scale05Cap = scale05Shares * ePrice;

        return {
          isValid: true,
          oneR, riskPerShare, totalRiskAmount, positionSize, positionValue, targetPrice, slPercentage,
          scale03Shares, scale04Shares, scale05Shares, scale03Cap, scale04Cap, scale05Cap
        };
      }, [portfolio, rPercent, entry, stopLoss, riskR, rrRatio, oneR]);

      // Portfolio Wide Stats
      const portfolioStats = useMemo(() => {
        const totalInvested = trades.reduce((sum, trade) => sum + trade.positionValue, 0);
        const totalRiskR = trades.reduce((sum, trade) => sum + trade.riskR, 0);
        const remainingCash = portfolio - totalInvested;
        const investedPercent = portfolio > 0 ? (totalInvested / portfolio) * 100 : 0;
        
        return { totalInvested, remainingCash, totalRiskR, investedPercent };
      }, [trades, portfolio]);

      const handleAddTrade = () => {
        if (!calculations.isValid) return;
        const newTrade = {
          id: Date.now(),
          symbol: debouncedStockCode || 'UNKNOWN',
          entry: parseFloat(entry),
          stopLoss: parseFloat(stopLoss),
          target: calculations.targetPrice,
          shares: calculations.positionSize,
          positionValue: calculations.positionValue,
          riskR: riskR,
        };
        setTrades([...trades, newTrade]);
        setActiveTab('port');
      };

      const removeTrade = (id) => {
        setTrades(trades.filter(t => t.id !== id));
      };

      // --- Style Presets ---
      const baseScaleClass = fontScales[fontScaleIdx];
      const iOSInputClass = `w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors ${baseScaleClass}`;
      const iOSCardClass = `bg-white dark:bg-[#1C1C1E] rounded-2xl p-4 sm:p-6 shadow-sm mb-6 transition-colors`;

      return html`
        <div class=${`min-h-screen pb-12 transition-colors duration-300 ${theme === 'dark' ? 'text-white' : 'text-gray-900'} ${baseScaleClass} font-sans`}>
          
          <!-- Top Sticky iOS Header Ribbon -->
          <nav class="sticky top-0 z-50 bg-[#F2F2F7]/80 dark:bg-[#000000]/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-900">
            <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
              <div class="flex items-center space-x-4">
                 <div class="flex items-center bg-gray-200/50 dark:bg-gray-800/50 rounded-full px-2 py-1">
                    <button onClick=${decreaseFont} class="p-1 px-2 text-sm font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === 0}>A</button>
                    <div class="w-px h-4 bg-gray-400/30 mx-1"></div>
                    <button onClick=${increaseFont} class="p-1 px-2 text-xl font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === fontScales.length - 1}>A</button>
                 </div>
              </div>
              
              <div class="font-bold text-center absolute left-1/2 -translate-x-1/2 tracking-wide truncate">
                VCP Pro
              </div>

              <div class="flex items-center space-x-2">
                <button onClick=${toggleLang} class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  <${GlobeIcon} />
                </button>
                <button onClick=${toggleTheme} class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  ${theme === 'light' ? html`<${MoonIcon} />` : html`<${SunIcon} />`}
                </button>
              </div>
            </div>
          </nav>

          <main class="max-w-3xl mx-auto px-4 pt-6">
            
            <!-- Navigation Tabs (Calculator & Portfolio) -->
            <div class="flex bg-gray-200/50 dark:bg-[#1C1C1E] p-1 rounded-xl mb-6 shadow-inner">
              <button 
                onClick=${() => setActiveTab('calc')}
                class=${`flex-1 flex items-center justify-center py-2.5 rounded-lg font-medium transition-all ${activeTab === 'calc' ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
              >
                <${CalculatorIcon} class="mr-2" /> ${t.calcTab}
              </button>
              <button 
                onClick=${() => setActiveTab('port')}
                class=${`flex-1 flex items-center justify-center py-2.5 rounded-lg font-medium transition-all ${activeTab === 'port' ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
              >
                <${BriefcaseIcon} class="mr-2" /> ${t.portTab}
              </button>
            </div>

            <!-- CALCULATOR SCREEN -->
            ${activeTab === 'calc' && html`
              <div class="transition-all duration-300">
                
                <!-- Real-time Portfolio Quick Info Ribbon -->
                <div class="flex justify-between items-center mb-4 px-2 text-sm text-gray-500 dark:text-gray-400">
                  <span>${t.portfolioSize}: <strong class="text-gray-800 dark:text-gray-200">$${portfolio.toLocaleString()}</strong></span>
                  <span>1R = <strong class="text-blue-500">$${oneR.toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong></span>
                </div>

                <!-- Entry & Risk Config -->
                <div class=${iOSCardClass}>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Stock Code Picker -->
                    <div class="col-span-1 md:col-span-2">
                      <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider flex justify-between">
                        ${t.stockCode}
                        ${isFetchingPrice && html`
                          <span class="text-blue-400 normal-case text-xs flex items-center">
                            <${ActivityIcon} class="mr-1 animate-pulse" /> ${t.fetchingPrice}
                          </span>
                        `}
                      </label>
                      <div class="relative">
                        <input 
                          type="text" 
                          value=${stockCode}
                          onChange=${(e) => setStockCode(e.target.value)}
                          class=${`${iOSInputClass} font-bold uppercase`}
                          placeholder="AAPL"
                          autoCapitalize="characters"
                          autoComplete="off"
                          autoCorrect="off"
                          spellCheck="false"
                        />
                        <${ChartIcon} class="absolute right-2 top-2 text-gray-400" />
                      </div>
                    </div>

                    <!-- Entry Input -->
                    <div>
                      <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">${t.entryPrice}</label>
                      <div class="relative">
                        <span class="absolute left-0 top-2 text-gray-400 font-medium">$</span>
                        <input 
                          type="number" 
                          inputMode="decimal"
                          value=${entry}
                          onChange=${(e) => setEntry(e.target.value)}
                          class=${`${iOSInputClass} pl-5`}
                          placeholder="150.00"
                        />
                      </div>
                    </div>

                    <!-- Stop Loss Input -->
                    <div>
                      <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">${t.stopLoss}</label>
                      <div class="relative">
                        <span class="absolute left-0 top-2 text-gray-400 font-medium">$</span>
                        <input 
                          type="number" 
                          inputMode="decimal"
                          value=${stopLoss}
                          onChange=${(e) => setStopLoss(e.target.value)}
                          class=${`${iOSInputClass} pl-5`}
                          placeholder="140.00"
                        />
                      </div>
                      ${calculations.isValid && html`
                        <div class=${`mt-2 flex items-start text-sm ${calculations.slPercentage > 10 ? 'text-red-500' : 'text-green-500'}`}>
                          ${calculations.slPercentage > 10 ? html`<${AlertIcon} class="mr-1 flex-shrink-0 mt-0.5" />` : null}
                          <span>${calculations.slPercentage > 10 ? t.slWarning : t.slGood} (-${calculations.slPercentage.toFixed(1)}%)</span>
                        </div>
                      `}
                    </div>

                    <!-- Target Risk slider (0.1R to 2.0R) -->
                    <div class="col-span-1 md:col-span-2 mt-4">
                      <div class="flex justify-between items-end mb-2">
                        <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${t.targetRisk}</label>
                        <div class="text-right">
                           <span class=${`font-bold text-2xl ${riskR > 1.5 ? 'text-red-500' : 'text-blue-500'}`}>
                             ${riskR.toFixed(1)} R
                           </span>
                           <div class="text-xs text-gray-400 normal-case">
                             Risk Amount: $${(oneR * riskR).toLocaleString(undefined, { maximumFractionDigits: 0 })}
                           </div>
                        </div>
                      </div>
                      
                      <div class="relative pt-1">
                        <input 
                          type="range" 
                          min="0.1" 
                          max="2.0" 
                          step="0.1" 
                          value=${riskR}
                          onChange=${(e) => setRiskR(parseFloat(e.target.value))}
                          class="w-full accent-blue-500"
                        />
                        <div class="relative h-5 w-full text-xs text-gray-400 mt-1">
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.0)', transform: 'translateX(-50%)' }}>0.1R</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.2105)', transform: 'translateX(-50%)' }}>0.5R</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.4737)', transform: 'translateX(-50%)' }}>1.0R</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.7368)', transform: 'translateX(-50%)' }}>1.5R</span>
                          <span class="absolute text-red-400 font-semibold whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 1.0)', transform: 'translateX(-50%)' }}>2.0R</span>
                        </div>
                      </div>
                    </div>

                    <!-- Reward-to-Risk ratio selector -->
                    <div class="col-span-1 md:col-span-2 mt-4">
                      <div class="flex justify-between items-end mb-2">
                        <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${t.rrRatio}</label>
                        <span class="font-bold text-xl text-green-500">
                          1 : ${rrRatio}
                        </span>
                      </div>
                      <div class="relative pt-1">
                        <input 
                          type="range" 
                          min="1" 
                          max="5" 
                          step="0.5" 
                          value=${rrRatio}
                          onChange=${(e) => setRrRatio(parseFloat(e.target.value))}
                          class="w-full accent-green-500"
                        />
                        <div class="relative h-5 w-full text-xs text-gray-400 mt-1">
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.0)', transform: 'translateX(-50%)' }}>1:1</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.25)', transform: 'translateX(-50%)' }}>1:2</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.5)', transform: 'translateX(-50%)' }}>1:3</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.75)', transform: 'translateX(-50%)' }}>1:4</span>
                          <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 1.0)', transform: 'translateX(-50%)' }}>1:5</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- TradingView Dynamic Snapshot Iframe -->
                <div class=${iOSCardClass + " overflow-hidden"}>
                   <div class="flex justify-between items-center mb-4">
                      <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">TradingView Snapshot</label>
                      <div class="flex space-x-1 bg-gray-100 dark:bg-[#2C2C2E] p-1 rounded-lg">
                        ${Object.entries(t.chartTabs).map(([key, label]) => html`
                          <button
                            key=${key}
                            onClick=${() => setInterval(key)}
                            class=${`px-3 py-1 rounded-md text-sm font-medium transition-colors ${
                              interval === key 
                                ? 'bg-white dark:bg-[#48484A] text-blue-500 shadow-sm' 
                                : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'
                            }`}
                          >
                            ${label}
                          </button>
                        `)}
                      </div>
                   </div>

                   <div class="w-full h-72 bg-gray-50 dark:bg-black/20 rounded-xl flex items-center justify-center border border-gray-100 dark:border-gray-800 relative">
                      ${!debouncedStockCode && html`
                        <div class="text-gray-400 flex flex-col items-center">
                          <${TrendingIcon} class="w-8 h-8 mb-2 opacity-50" />
                          <p>${t.chartPlaceholder}</p>
                        </div>
                      `}
                      ${debouncedStockCode && html`
                         <div 
                           id="tv_chart_container" 
                           ref=${chartContainerRef} 
                           class="absolute inset-0 w-full h-full rounded-xl overflow-hidden"
                         />
                      `}
                   </div>
                </div>

                <!-- Trade Execution Plan Outputs -->
                <div class=${`${iOSCardClass} border-2 ${calculations.isValid ? 'border-blue-500/30 dark:border-blue-500/30' : 'border-transparent'}`}>
                  <div class="flex items-center mb-4">
                    <${InfoIcon} class="text-blue-500 mr-2" />
                    <h2 class="text-lg font-bold">${t.tradePlan}</h2>
                  </div>

                  ${!calculations.isValid ? html`
                    <p class="text-gray-500 dark:text-gray-400 text-center py-6">${t.invalidInput}</p>
                  ` : html`
                    <div class="space-y-4">
                      
                      <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl flex justify-between items-center">
                        <span class="font-medium text-blue-800 dark:text-blue-300">${t.positionSize}</span>
                        <span class="text-2xl font-bold text-blue-600 dark:text-blue-400">
                          ${calculations.positionSize.toLocaleString()}
                        </span>
                      </div>

                      <div class="grid grid-cols-2 gap-4">
                         <div class="bg-gray-50 dark:bg-[#2C2C2E] p-4 rounded-xl">
                            <span class="block text-xs text-gray-500 dark:text-gray-400 mb-1">${t.capitalRequired}</span>
                            <span class="font-bold text-lg">$${calculations.positionValue.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                         </div>
                         <div class="bg-gray-50 dark:bg-[#2C2C2E] p-4 rounded-xl border border-green-100 dark:border-green-900/30">
                            <span class="block text-xs text-gray-500 dark:text-gray-400 mb-1 text-green-600 dark:text-green-400">${t.targetPrice}</span>
                            <span class="font-bold text-lg text-green-600 dark:text-green-400">$${calculations.targetPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                         </div>
                      </div>

                      <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-800">
                        <h3 class="font-semibold mb-3 text-gray-700 dark:text-gray-200">${t.scaleInTitle}</h3>
                        <div class="grid grid-cols-3 gap-3 text-center mb-4">
                           <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-800/30">
                              <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">0.3R</div>
                              <div class="font-bold text-blue-700 dark:text-blue-300">${calculations.scale03Shares} <span class="text-[10px] font-normal">sh</span></div>
                              <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">$${calculations.scale03Cap.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                           </div>
                           <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-800/30">
                              <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">0.4R</div>
                              <div class="font-bold text-blue-700 dark:text-blue-300">${calculations.scale04Shares} <span class="text-[10px] font-normal">sh</span></div>
                              <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">$${calculations.scale04Cap.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                           </div>
                           <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-800/30">
                              <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">0.5R</div>
                              <div class="font-bold text-blue-700 dark:text-blue-300">${calculations.scale05Shares} <span class="text-[10px] font-normal">sh</span></div>
                              <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">$${calculations.scale05Cap.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                           </div>
                        </div>
                        <div class="space-y-3">
                           <div class="flex justify-between items-center text-sm bg-gray-50 dark:bg-[#2C2C2E] p-3 rounded-xl">
                              <span class="text-gray-500 dark:text-gray-400">${t.secondBet}</span>
                              <span class="font-bold text-gray-700 dark:text-gray-200">Remaining Balance</span>
                           </div>
                        </div>
                      </div>
                      
                      <button 
                        onClick=${handleAddTrade}
                        class="w-full mt-4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl flex items-center justify-center transition-colors shadow-sm"
                      >
                        <${PlusIcon} class="mr-2" /> ${t.addToPortfolio}
                      </button>

                    </div>
                  `}
                </div>
                
                <!-- Rules Checklist -->
                <div class=${iOSCardClass}>
                   <h3 class="font-bold mb-3 text-gray-800 dark:text-gray-200 flex items-center">
                     <${TrendingIcon} class="mr-2 text-blue-500" /> ${t.rulesSummary}
                   </h3>
                   <ul class="space-y-2 pl-6 list-disc text-sm text-gray-600 dark:text-gray-400">
                     <li>${t.rule1}</li>
                     <li>${t.rule2}</li>
                     <li>${t.rule3}</li>
                     <li>${t.rule4}</li>
                   </ul>
                </div>
              </div>
            `}

            <!-- PORTFOLIO SCREEN -->
            ${activeTab === 'port' && html`
              <div class="transition-all duration-300 space-y-6">
                
                <!-- Total Assets & Variable 1R % -->
                <div class=${iOSCardClass}>
                  <h2 class="text-lg font-bold mb-4 flex items-center"><${BriefcaseIcon} class="mr-2 text-blue-500" /> Asset Configuration</h2>
                  
                  <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">${t.portfolioSize}</label>
                    <div class="relative">
                      <span class="absolute left-0 top-2 text-gray-400 font-medium">$</span>
                      <input 
                        type="text" 
                        inputMode="decimal"
                        value=${portfolioInput}
                        onChange=${handlePortfolioInputChange}
                        class=${`${iOSInputClass} pl-5 font-bold text-xl`}
                        placeholder="100,000"
                      />
                    </div>
                  </div>

                  <div>
                    <div class="flex justify-between items-end mb-2">
                      <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${t.baseRisk}</label>
                      <div class="text-right">
                        <span class="font-bold text-xl text-blue-500">${rPercent}%</span>
                        <div class="text-xs text-gray-400 normal-case">1R = $${oneR.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                      </div>
                    </div>
                    <div class="relative pt-1">
                      <input 
                        type="range" 
                        min="0.25" 
                        max="2.0" 
                        step="0.25" 
                        value=${rPercent}
                        onChange=${(e) => setRPercent(parseFloat(e.target.value))}
                        class="w-full accent-blue-500"
                      />
                      <div class="relative h-5 w-full text-xs text-gray-400 mt-1">
                        <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.0)', transform: 'translateX(-50%)' }}>0.25%</span>
                        <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 0.4286)', transform: 'translateX(-50%)' }}>1.0%</span>
                        <span class="absolute whitespace-nowrap" style=${{ left: 'calc(13px + (100% - 26px) * 1.0)', transform: 'translateX(-50%)' }}>2.0%</span>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Live Risk Exposure Thermometer and Percentage Bars -->
                <div class=${iOSCardClass}>
                   <h3 class="font-bold mb-4 text-gray-800 dark:text-gray-200">${t.riskThermometer}</h3>
                   
                   <!-- 10R Thermometer -->
                   <div class="mb-6">
                      <div class="flex justify-between text-sm mb-1">
                        <span class="font-medium text-gray-600 dark:text-gray-400">Live Risk</span>
                        <span class=${`font-bold ${portfolioStats.totalRiskR > 8 ? 'text-red-500' : 'text-blue-500'}`}>
                          ${portfolioStats.totalRiskR.toFixed(2)} R / 10 R
                        </span>
                      </div>
                      <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-4 overflow-hidden">
                        <div 
                          class=${`h-4 rounded-full transition-all duration-500 ${portfolioStats.totalRiskR > 7 ? 'bg-red-500' : portfolioStats.totalRiskR > 4 ? 'bg-yellow-500' : 'bg-green-500'}`}
                          style=${{ width: `${Math.min((portfolioStats.totalRiskR / 10) * 100, 100)}%` }}
                        ></div>
                      </div>
                   </div>

                   <!-- Capital Allocation & Cash Split Percentage Bar -->
                   <div>
                      <div class="flex justify-between text-sm mb-1">
                        <span class="font-medium text-gray-600 dark:text-gray-400">${t.totalExposure}</span>
                        <span class="font-bold text-gray-800 dark:text-gray-200">${portfolioStats.investedPercent.toFixed(1)}%</span>
                      </div>
                      <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-4 overflow-hidden flex">
                        <div 
                          class="bg-blue-500 h-4 transition-all duration-500"
                          style=${{ width: `${portfolioStats.investedPercent}%` }}
                        ></div>
                        <div class="bg-gray-300 dark:bg-gray-700 h-4 flex-1"></div>
                      </div>
                      <div class="flex justify-between text-xs text-gray-500 mt-2">
                         <span>In Market: $${portfolioStats.totalInvested.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                         <span>Cash: $${portfolioStats.remainingCash.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                      </div>
                   </div>
                </div>

                <!-- Portfolio Saved Trades List -->
                <div class=${`${iOSCardClass} p-0 overflow-hidden`}>
                   <div class="p-4 sm:p-6 border-b border-gray-100 dark:border-gray-800">
                     <h3 class="font-bold text-gray-800 dark:text-gray-200">${t.activeTrades}</h3>
                   </div>
                   
                   ${trades.length === 0 ? html`
                     <div class="p-8 text-center text-gray-500 dark:text-gray-400">
                       ${t.noTrades}
                     </div>
                   ` : html`
                     <div class="divide-y divide-gray-100 dark:divide-gray-800">
                       ${trades.map(trade => html`
                         <div key=${trade.id} class="p-4 sm:p-6 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-[#252528] transition-colors">
                           <div>
                             <div class="font-bold text-lg mb-1 flex items-center space-x-2">
                               <span>${trade.symbol}</span>
                               <span class="text-xs px-2 py-1 bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 rounded-md">
                                 ${trade.riskR.toFixed(1)}R Risk
                               </span>
                             </div>
                             <div class="text-sm text-gray-500 dark:text-gray-400 grid grid-cols-2 gap-x-4">
                               <span>Entry: $${trade.entry}</span>
                               <span>SL: $${trade.stopLoss}</span>
                               <span>Target: $${trade.target.toFixed(2)}</span>
                               <span>Value: $${trade.positionValue.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                             </div>
                           </div>
                           <button 
                             onClick=${() => removeTrade(trade.id)}
                             class="p-3 text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors"
                           >
                             <${TrashIcon} />
                           </button>
                         </div>
                       `)}
                     </div>
                   `}
                </div>

              </div>
            `}

          </main>
        </div>
      `;
    }

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(React.createElement(App));
  </script>
</body>
</html>
