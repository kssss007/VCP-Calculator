      if (value === null || value === undefined || value === '') return '';
      const cleanValue = value.toString().replace(/[^0-9.]/g, '');
      const parts = cleanValue.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');

      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      const expires = "expires=" + d.toUTCString();
      document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/;SameSite=Lax";

      const cname = name + "=";
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') {
          c = c.substring(1);
        }
        if (c.indexOf(cname) == 0) {
          return c.substring(cname.length, c.length);
        }
      }
      return "";

      // --- Highly Resilient Dual-Proxy Stock Price Fetch Helper ---
      const fetchPriceForSymbol = async (symbol) => {
        let parsedSymbol = symbol.trim().toUpperCase();
        if (!parsedSymbol) return null;
        
        let yahooSymbol = parsedSymbol;
        // Map common exchanges
        if (/^\d{4}$/.test(parsedSymbol)) {
          yahooSymbol = `${parsedSymbol}.HK`;
        } else if (['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE'].includes(parsedSymbol)) {
          yahooSymbol = `${parsedSymbol}-USD`;
        }

        const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${yahooSymbol}?interval=1m&range=1d`;
        
        try {
          const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`);
          if (res.ok) {
            const data = await res.json();
            const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price) return parseFloat(price);
          }
        } catch (e) {
          console.warn("Primary CORS proxy failed, falling back to AllOrigins...", e);
        }

        try {
          const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`);
          if (res.ok) {
            const data = await res.json();
            const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price) return parseFloat(price);
          }
        } catch (e) {
          console.error("All proxies failed to fetch quote for " + symbol, e);
        }
        return null;
      };

      // --- Google Sheets Synchronization Engine via Web App CORS Proxy ---
      const pullTradesFromGoogleSheets = async () => {
        if (!gdriveWebAppUrl || !gdriveSheetUrl) {
          setSyncStatus('error');
          return;
        }
        setSyncStatus('syncing');
        try {
          const url = `${gdriveWebAppUrl}?sheetUrl=${encodeURIComponent(gdriveSheetUrl)}`;
          const res = await fetch(url);
          const data = await res.json();
          if (data && data.status === 'success') {
            if (data.trades && Array.isArray(data.trades)) setTrades(data.trades);
            if (data.history && Array.isArray(data.history)) setHistory(data.history);
            saveLocalData(portfolioInput, rPercent, data.trades || [], data.history || []);
            setSyncStatus('synced');
          } else {
            setSyncStatus('error');
          }
        } catch (e) {
          console.error("Google Sheets pull failed", e);
          setSyncStatus('error');
        }
      };

      const pushTradesToGoogleSheets = async (activeList = trades, historyList = history) => {
        if (!gdriveWebAppUrl || !gdriveSheetUrl) return;
        setSyncStatus('syncing');
        try {
          const payload = {
            sheetUrl: gdriveSheetUrl,
            trades: activeList,
            history: historyList
          };
          await fetch(gdriveWebAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          setSyncStatus('synced');
        } catch (e) {
          console.error("Sheets push failed", e);
          setSyncStatus('error');
        }
      };

      const handleSaveSheetUrl = (val) => {
        setGdriveSheetUrl(val);
        localStorage.setItem('vcp_gdrive_sheet_url', val);
      };

      const handleSaveWebAppUrl = (val) => {
        setGdriveWebAppUrl(val);
        localStorage.setItem('vcp_gdrive_webapp_url', val);
      };

      // --- Hybrid Cookie & LocalStorage Load/Save fallbacks ---
      useEffect(() => {
        const cached = localStorage.getItem('vcp_state') || getCookieBackup('vcp_state');
        if (cached) {
          try {
            const data = JSON.parse(cached);
            if (data.portfolioInput) setPortfolioInput(data.portfolioInput);
            if (data.rPercent) setRPercent(data.rPercent);
            if (data.trades && Array.isArray(data.trades)) setTrades(data.trades);
            if (data.history && Array.isArray(data.history)) setHistory(data.history);
          } catch (e) {
            console.warn("Cached recovery failed", e);
          }
        }
      }, []);

      const saveLocalData = (pIn, rPer, trds, hist) => {
        const payload = JSON.stringify({ portfolioInput: pIn, rPercent: rPer, trades: trds, history: hist });
        localStorage.setItem('vcp_state', payload);
        setCookieBackup('vcp_state', payload, 365);
      };

      // Global Orchestrated Save Engine
      const triggerSave = (newPortfolio, newRPercent, newTrades, newHistory) => {
        saveLocalData(newPortfolio, newRPercent, newTrades, newHistory);
        if (gdriveWebAppUrl && gdriveSheetUrl) {
          pushTradesToGoogleSheets(newTrades, newHistory);
        }
      };

      const updatePortfolioValue = (newValue) => {
        setPortfolioInput(newValue);
        triggerSave(newValue, rPercent, trades, history);
      };

      const updateRPercentValue = (newValue) => {
        setRPercent(newValue);
        triggerSave(portfolioInput, newValue, trades, history);
      };

      const updateTradesList = (newTrades) => {
        const safeTrades = Array.isArray(newTrades) ? newTrades : [];
        setTrades(safeTrades);
        triggerSave(portfolioInput, rPercent, safeTrades, history);
      };

      const updateHistoryList = (newHistory) => {
        const safeHistory = Array.isArray(newHistory) ? newHistory : [];
        setHistory(safeHistory);
        triggerSave(portfolioInput, rPercent, trades, safeHistory);
      };

      // Parse current active numeric value of portfolio
      const portfolio = useMemo(() => {
        const num = parseFloat(parseCommas(portfolioInput));
        return isNaN(num) ? 0 : num;
      }, [portfolioInput]);

      const handlePortfolioInputChange = (e) => {
        const raw = parseCommas(e.target.value);
        if (raw === '' || !isNaN(raw)) {
          updatePortfolioValue(formatCommas(raw));
        }
      };

      // Theme toggle effects
      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [theme]);

      // Debounce stock code input
      useEffect(() => {
        const timer = setTimeout(() => {
          setDebouncedStockCode(stockCode.trim().toUpperCase());
        }, 800);
        return () => clearTimeout(timer);
      }, [stockCode]);

      // --- TradingView Price fetching for calculator ---
      useEffect(() => {
        const loadCalcPrice = async () => {
          if (!debouncedStockCode) return;
          setIsFetchingPrice(true);
          const price = await fetchPriceForSymbol(debouncedStockCode);
          if (price) {
            setEntry(price.toFixed(2));
          }
          setIsFetchingPrice(false);
        };
        loadCalcPrice();
      }, [debouncedStockCode]);

      // --- Dynamic Portfolio Price Sync ---
      const refreshPortfolioPrices = async () => {
        if (!trades || trades.length === 0) return;
        setPortfolioLoadingPrices(true);
        const uniqueSymbols = [...new Set(trades.map(t => t.symbol))];
        const newPrices = { ...livePrices };

        for (const sym of uniqueSymbols) {
          if (sym === 'UNKNOWN') continue;
          const price = await fetchPriceForSymbol(sym);
          if (price) {
            newPrices[sym] = price;
          }
        }
        setLivePrices(newPrices);
        setPortfolioLoadingPrices(false);
      };

      useEffect(() => {
        if (activeTab === 'port' && trades.length > 0) {
          refreshPortfolioPrices();
          const timer = window.setInterval(refreshPortfolioPrices, 30000); 
          return () => clearInterval(timer);
        }
      }, [activeTab, trades]);

      // --- Mobile Swipe Navigation Gestures ---
      const handleTouchStart = (e) => {
        if (e.target.closest('input[type="range"]') || e.target.closest('#tv_chart_container')) {
          return; // Avoid swiping on sliders or interactive charts
        }
        touchStartX.current = e.touches[0].clientX;
      };

      const handleTouchMove = (e) => {
        touchEndX.current = e.touches[0].clientX;
      };

      const handleTouchEnd = () => {
        const diffX = touchStartX.current - touchEndX.current;
        const tabsOrder = ['calc', 'port', 'history'];
        const currentIdx = tabsOrder.indexOf(activeTab);

        if (Math.abs(diffX) > 60) { // Swipe sensitivity threshold
          if (diffX > 0 && currentIdx < tabsOrder.length - 1) {
            setActiveTab(tabsOrder[currentIdx + 1]); // Swipe Left -> Go Right
          } else if (diffX < 0 && currentIdx > 0) {
            setActiveTab(tabsOrder[currentIdx - 1]); // Swipe Right -> Go Left
          }
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      const oneR = portfolio * (parseFloat(rPercent) || 1) / 100;

      // Stop Loss Calculations based on Mode & Buy/Sell direction
      const slCalc = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const rawVal = parseFloat(slValue) || 0;

        if (ePrice <= 0 || rawVal <= 0) {
          return { price: 0, percent: 0, isValid: false };
        }

        if (slMode === 'price') {
          if (tradeType === 'buy') {
            if (rawVal >= ePrice) return { price: rawVal, percent: 0, isValid: false };
            const percent = ((ePrice - rawVal) / ePrice) * 100;
            return { price: rawVal, percent, isValid: true };
          } else { // sell/short
            if (rawVal <= ePrice) return { price: rawVal, percent: 0, isValid: false };
            const percent = ((rawVal - ePrice) / ePrice) * 100;
            return { price: rawVal, percent, isValid: true };
          }
        } else { // percentage mode
          if (rawVal >= 100) return { price: 0, percent: rawVal, isValid: false };
          if (tradeType === 'buy') {
            const price = ePrice * (1 - rawVal / 100);
            return { price, percent: rawVal, isValid: true };
          } else { // sell/short
            const price = ePrice * (1 + rawVal / 100);
            return { price, percent: rawVal, isValid: true };
          }
        }
      }, [entry, slValue, slMode, tradeType]);

      // --- Unified Risk-to-Reward Ratio Computations ---
      const rrRatioComputed = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        const val = parseFloat(rrValue) || 0;
        const riskPerShare = slCalc.isValid ? Math.abs(ePrice - slCalc.price) : 0;

        if (ePrice <= 0 || riskPerShare <= 0 || val <= 0) {
          return { ratio: 2.0, targetPrice: 0, targetPercent: 0, isValid: false };
        }

        if (rrMode === 'ratio') {
          const targetPrice = tradeType === 'buy' ? ePrice + (riskPerShare * val) : ePrice - (riskPerShare * val);
          const targetPercent = (Math.abs(targetPrice - ePrice) / ePrice) * 100;
          return { ratio: val, targetPrice, targetPercent, isValid: true };
        } else if (rrMode === 'price') {
          if (tradeType === 'buy' && val <= ePrice) return { ratio: 0, targetPrice: val, targetPercent: 0, isValid: false };
          if (tradeType === 'sell' && val >= ePrice) return { ratio: 0, targetPrice: val, targetPercent: 0, isValid: false };
          const ratio = Math.abs(val - ePrice) / riskPerShare;
          const targetPercent = (Math.abs(val - ePrice) / ePrice) * 100;
          return { ratio, targetPrice: val, targetPercent, isValid: true };
        } else { // rrMode === 'percent'
          const targetPrice = tradeType === 'buy' ? ePrice * (1 + (val / 100)) : ePrice * (1 - (val / 100));
          const ratio = Math.abs(targetPrice - ePrice) / riskPerShare;
          return { ratio, targetPrice, targetPercent: val, isValid: true };
        }
      }, [entry, rrValue, rrMode, slCalc, tradeType]);

      // Active Calculator Calculations
      const calculations = useMemo(() => {
        const ePrice = parseFloat(entry) || 0;
        
        if (ePrice <= 0 || !slCalc.isValid || !rrRatioComputed.isValid || portfolio <= 0) {
          return { isValid: false, oneR };
        }

        const riskPerShare = Math.abs(ePrice - slCalc.price);
        const totalRiskAmount = oneR * riskR;
        
        const positionSize = Math.floor(totalRiskAmount / riskPerShare);
        const positionValue = positionSize * ePrice;
        
        const targetPrice = rrRatioComputed.targetPrice;
        const slPercentage = slCalc.percent;
        
        const scaleFirstShares = Math.floor(positionSize * firstBetMultiplier);
        const scaleFirstCap = scaleFirstShares * ePrice;
        const scaleRemainingShares = positionSize - scaleFirstShares;
        const scaleRemainingCap = scaleRemainingShares * ePrice;

        return {
          isValid: true,
          oneR, riskPerShare, totalRiskAmount, positionSize, positionValue, targetPrice, slPercentage,
          scaleFirstShares, scaleFirstCap, scaleRemainingShares, scaleRemainingCap
        };
      }, [portfolio, rPercent, entry, slCalc, riskR, rrRatioComputed, oneR, firstBetMultiplier]);

      // R:R Mode Switch Equivalency Conversion
      const handleToggleRRMode = (newMode) => {
        if (newMode === rrMode) return;
        if (rrRatioComputed.isValid) {
          if (newMode === 'ratio') {
            setRrValue(rrRatioComputed.ratio.toFixed(2));
          } else if (newMode === 'price') {
            setRrValue(rrRatioComputed.targetPrice.toFixed(2));
          } else { 
            setRrValue(rrRatioComputed.targetPercent.toFixed(2));
          }
        } else {
          setRrValue('');
        }
        setRrMode(newMode);
      };

      // Portfolio and realized stats calculations
      const portfolioStats = useMemo(() => {
        const totalInvested = trades.reduce((sum, trade) => sum + trade.positionValue, 0);
        const totalRiskR = trades.reduce((sum, trade) => sum + trade.riskR, 0);
        const remainingCash = portfolio - totalInvested;
        const investedPercent = portfolio > 0 ? (totalInvested / portfolio) * 100 : 0;

        let netProfit = 0;
        trades.forEach(trade => {
          const livePrice = livePrices[trade.symbol];
          if (livePrice) {
            const isBuy = trade.type !== 'sell';
            const diff = isBuy ? (livePrice - trade.entry) : (trade.entry - livePrice);
            netProfit += diff * trade.shares;
          }
        });

        const realizedPnL = history.reduce((sum, h) => {
          const isBuy = h.type !== 'sell';
          const diff = isBuy ? (h.exitPrice - h.entry) : (h.entry - h.exitPrice);
          return sum + (diff * h.shares);
        }, 0);
        
        return { totalInvested, remainingCash, totalRiskR, investedPercent, netProfit, realizedPnL };
      }, [trades, history, portfolio, livePrices]);

      // Add To Active Positions
      const handleAddTrade = () => {
        if (!calculations.isValid) return;
        const newTrade = {
          id: Date.now(),
          symbol: debouncedStockCode || 'UNKNOWN',
          type: tradeType,
          entry: parseFloat(entry),
          stopLoss: slCalc.price,
          target: calculations.targetPrice,
          shares: calculations.positionSize,
          positionValue: calculations.positionValue,
          riskR: riskR,
          rationale: rationale.trim(), 
        };
        updateTradesList([...trades, newTrade]);
        setRationale(''); 
        setActiveTab('port');
      };

      // Move Active Trade to History Tab on Position Closure
      const handleClosePositionClick = (trade) => {
        setClosingTrade(trade);
        // Default entry to exit pricing
        const currentLive = livePrices[trade.symbol];
        setExitPriceInput(currentLive ? currentLive.toFixed(2) : trade.entry.toFixed(2));
      };

      const handleConfirmPositionClose = () => {
        if (!closingTrade) return;
        const exitPr = parseFloat(exitPriceInput) || 0;
        
        const closedRecord = {
          ...closingTrade,
          exitPrice: exitPr,
          closedAt: Date.now()
        };

        const remainingActive = trades.filter(t => t.id !== closingTrade.id);
        const newHistory = [closedRecord, ...history];

        updateTradesList(remainingActive);
        updateHistoryList(newHistory);
        setClosingTrade(null);
        setActiveTab('history');
      };

      const removeTrade = (id) => {
        updateTradesList(trades.filter(t => t.id !== id));
      };

      const removeHistoryItem = (id) => {
        updateHistoryList(history.filter(h => h.id !== id));
      };

      // Safe Non-nested String Class Binding Helpers
      const getStopLossBtnClass = (mode) => {
        const base = "px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors cursor-pointer ";
        return base + (slMode === mode 
          ? "bg-white dark:bg-gray-700 text-blue-500 shadow-sm" 
          : "text-gray-500 hover:text-gray-700 dark:hover:text-gray-300");
      };

      const getRrBtnClass = (mode) => {
        const base = "px-[0.5em] py-[0.25em] rounded-md font-medium transition-colors cursor-pointer ";
        return base + (rrMode === mode 
          ? "bg-white dark:bg-gray-700 text-blue-500 shadow-sm" 
          : "text-gray-500 hover:text-gray-700 dark:hover:text-gray-300");
      };

      const toggleDisclosure = (key) => {
        setDisclosureOpen(prev => ({ ...prev, [key]: !prev[key] }));
      };

      // --- Restoration of Missing Configuration Actions ---
      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      const toggleLang = () => setLang(prev => prev === 'en' ? 'zh' : 'en');
      const decreaseFont = () => setFontScaleIdx(prev => Math.max(0, prev - 1));
      const increaseFont = () => setFontScaleIdx(prev => Math.min(fontScaleStyles.length - 1, prev + 1));

      // --- Bulletproof TradingView Snapshot Render Handler ---
      useEffect(() => {
        if (activeTab !== 'calc' || !debouncedStockCode || !chartContainerRef.current) return;
        
        chartContainerRef.current.innerHTML = '';
        const script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/tv.js';
        script.async = true;
        script.onload = () => {
          if (window.TradingView) {
            let tvSymbol = debouncedStockCode;
            if (/^\d{4}$/.test(tvSymbol)) tvSymbol = `HKEX:${tvSymbol}`;
            else if (['BTC', 'ETH', 'SOL', 'XRP'].includes(tvSymbol)) tvSymbol = `BINANCE:${tvSymbol}USDT`;

            new window.TradingView.widget({
              autosize: true,
              symbol: tvSymbol,
              interval: interval,
              timezone: "Etc/UTC",
              theme: theme,
              style: "1",
              locale: lang === 'zh' ? 'zh_TW' : 'en',
              enable_publishing: false,
              hide_top_toolbar: true,
              hide_legend: false,
              save_image: false,
              container_id: chartContainerRef.current.id,
            });
          }
        };
        document.head.appendChild(script);

        return () => {
          if (chartContainerRef.current) chartContainerRef.current.innerHTML = '';
        };
      }, [debouncedStockCode, interval, theme, activeTab]);

      // Styles & Proportional Scaling
      const activeFontSizeStyle = fontScaleStyles[fontScaleIdx];
      const iOSInputClass = `w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors text-[1.1em]`;
      const iOSCardClass = `bg-white dark:bg-[#1C1C1E] rounded-2xl p-[1.5em] shadow-sm mb-[1.5em] transition-colors`;

      return html`
        <div 
          style=${{ fontSize: activeFontSizeStyle }} 
          class=${`min-h-screen pb-12 transition-all duration-300 ${theme === 'dark' ? 'text-white' : 'text-gray-900'} font-sans`}
          onTouchStart=${handleTouchStart}
          onTouchMove=${handleTouchMove}
          onTouchEnd=${handleTouchEnd}
        >
          
          <!-- Top Sticky iOS Navigation Ribbon with Integrated Three Tab Segments -->
          <nav class="sticky top-0 z-50 bg-[#F2F2F7]/80 dark:bg-[#000000]/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-900">
            <div class="max-w-3xl mx-auto px-[1em] h-[3.75em] flex items-center justify-between relative">
              
              <!-- Left Column: Proportional Font Size Scaling Controls -->
              <div class="flex items-center z-10">
                 <div class="flex items-center bg-gray-200/50 dark:bg-gray-800/50 rounded-full px-[0.4em] py-[0.15em]">
                    <button onClick=${decreaseFont} class="p-[0.25em] px-[0.5em] text-[0.8em] font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === 0}>A</button>
                    <div class="w-px h-[0.9em] bg-gray-400/30 mx-[0.2em]"></div>
                    <button onClick=${increaseFont} class="p-[0.25em] px-[0.4em] text-[1.1em] font-semibold hover:text-blue-500 disabled:opacity-30" disabled=${fontScaleIdx === fontScaleStyles.length - 1}>A</button>
                 </div>
              </div>
              
              <!-- Center Column: Seamlessly Embedded Three Segment Tab Controls -->
              <div class="absolute left-1/2 -translate-x-1/2 z-10">
                <div class="flex bg-gray-200/50 dark:bg-[#1C1C1E] p-[0.15em] rounded-xl shadow-inner text-[0.8em] border border-gray-300/30 dark:border-gray-800">
                  <button 
                    onClick=${() => setActiveTab('calc')}
                    class=${`px-[0.75em] sm:px-[1.25em] py-[0.35em] rounded-lg font-bold transition-all flex items-center space-x-[0.25em] ${activeTab === 'calc' ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
                  >
                    <${CalculatorIcon} />
                    <span>${t.calcTab}</span>
                  </button>
                  <button 
                    onClick=${() => setActiveTab('port')}
                    class=${`px-[0.75em] sm:px-[1.25em] py-[0.35em] rounded-lg font-bold transition-all flex items-center space-x-[0.25em] ${activeTab === 'port' ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
                  >
                    <${BriefcaseIcon} />
                    <span>${t.portTab}</span>
                  </button>
                  <button 
                    onClick=${() => setActiveTab('history')}
                    class=${`px-[0.75em] sm:px-[1.25em] py-[0.35em] rounded-lg font-bold transition-all flex items-center space-x-[0.25em] ${activeTab === 'history' ? 'bg-white dark:bg-[#2C2C2E] shadow text-blue-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}
                  >
                    <${HistoryIcon} />
                    <span>${t.historyTab}</span>
                  </button>
                </div>
              </div>

              <!-- Right Column: Language Toggle & Light/Dark Theme Controls -->
              <div class="flex items-center space-x-[0.25em] z-10">
                <button onClick=${toggleLang} class="p-[0.4em] rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  <${GlobeIcon} />
                </button>
                <button onClick=${toggleTheme} class="p-[0.4em] rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                  ${theme === 'light' ? html`<${MoonIcon} />` : html`<${SunIcon} />`}
                </button>
              </div>
            </div>
          </nav>

          <main class="max-w-3xl mx-auto px-[1em] pt-[1.5em]">

            <!-- CALCULATOR SCREEN -->
            ${activeTab === 'calc' && html`
              <div class="transition-all duration-300">
                
                <!-- Real-time Portfolio Quick Info Ribbon with Sync Status -->
                <div class="flex justify-between items-center mb-[1em] px-[0.5em] text-[0.875em] text-gray-500 dark:text-gray-400">
                  <span>${t.portfolioSize}: <strong class="text-gray-800 dark:text-gray-200">$${portfolio.toLocaleString()}</strong></span>
                  <span class="text-[0.75em] font-semibold px-[0.75em] py-[0.25em] rounded-full bg-blue-100 text-blue-800 dark:bg-blue-950 dark:text-blue-300">
                    ${gdriveWebAppUrl ? 'GSheets Synced ✓' : t.localMode}
                  </span>
                  <span>1R = <strong class="text-blue-500">$${oneR.toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong></span>
                </div>

                <!-- Entry & Risk Config Grid - Aligned Perfectly using vertical flex elements with bottom-baselines -->
                <div class=${iOSCardClass}>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-[1.5em] items-end">
                    
                    <!-- Stock Code Picker -->
                    <div class="col-span-1 md:col-span-2">
                      <label class="block text-[0.875em] font-semibold text-gray-500 dark:text-gray-400 mb-[0.5em] uppercase tracking-wider flex justify-between">
                        ${t.stockCode}
                        ${isFetchingPrice && html`
                          <span class="text-blue-400 normal-case text-[0.75em] flex items-center">
                            <${ActivityIcon} class="mr-[0.25em] animate-pulse" /> ${t.fetchingPrice}
                          </span>
                        `}
                      </label>
                      <div class="relative">
                        <input 
                          type="text" 
                          value=${stockCode}
                          onChange=${(e) => setStockCode(e.target.value)}
                          class=${`${iOSInputClass} font-bold uppercase`}
                          placeholder="AAPL"
                          autoCapitalize="characters"
                          autoComplete="off"
                          autoCorrect="off"
                          spellCheck="false"
                        />
                        <${ChartIcon} class="absolute right-[0.5em] top-[0.5em] text-gray-400" />
                      </div>
                    </div>

                          class=${`h-full rounded-full transition-all duration-500 ${portfolioStats.totalRiskR > 7 ? 'bg-red-500' : portfolioStats.totalRiskR > 4 ? 'bg-yellow-500' : 'bg-green-500'}`}
                          style=${{ width: `${Math.min((portfolioStats.totalRiskR / 10) * 100, 100)}%` }}
                        ></div>
                      </div>
                   </div>

                   <!-- Capital Allocation & Cash Split Percentage Bar -->
                   <div>
                      <div class="flex justify-between text-[0.875em] mb-[0.25em]">
                        <span class="font-medium text-gray-600 dark:text-gray-400">${t.totalExposure}</span>
                        <span class="font-bold text-gray-800 dark:text-gray-200">${portfolioStats.investedPercent.toFixed(1)}%</span>
                      </div>
                      <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-[1em] overflow-hidden flex">
                        <div 
                          class="bg-blue-500 h-full transition-all duration-500"
                          style=${{ width: `${portfolioStats.investedPercent}%` }}
                        ></div>
                        <div class="bg-gray-300 dark:bg-gray-700 h-full flex-1"></div>
                      </div>
                      <div class="flex justify-between text-[0.75em] text-gray-500 mt-[0.5em]">
                         <span>In Market: $${portfolioStats.totalInvested.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                         <span>Cash: $${portfolioStats.remainingCash.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                      </div>
                   </div>
                </div>

                <!-- Active Portfolio Trades List with Live P&L Updates -->
                <div class=${`${iOSCardClass} p-0 overflow-hidden`}>
                   <div class="p-[1em] border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
                     <h3 class="font-bold text-gray-800 dark:text-gray-200 text-[1em]">${t.activeTrades}</h3>
                     ${portfolioLoadingPrices && html`<span class="text-xs text-blue-500 animate-pulse flex items-center"><${ActivityIcon} class="mr-1" /> Updating quotes...</span>`}
                   </div>
                   
                   ${trades.length === 0 ? html`
                     <div class="p-[2em] text-center text-gray-500 dark:text-gray-400 text-[0.9em]">
                       ${t.noTrades}
                     </div>
                   ` : html`
                     <div class="divide-y divide-gray-100 dark:divide-gray-800">
                       ${trades.map(trade => {
                         const livePrice = livePrices[trade.symbol];
                         const hasLivePrice = livePrice !== undefined && livePrice !== null && trade.symbol !== 'UNKNOWN';
                         const isBuy = trade.type !== 'sell';
                         const tradeProfit = hasLivePrice ? (isBuy ? (livePrice - trade.entry) : (trade.entry - livePrice)) * trade.shares : 0;
                         const profitPercent = hasLivePrice ? ((isBuy ? (livePrice - trade.entry) : (trade.entry - livePrice)) / trade.entry) * 100 : 0;
                         const isEditingNote = editingTradeId === trade.id;

                         return html`
                           <div key=${trade.id} class="p-[1.25em] flex flex-col sm:flex-row items-start sm:items-center justify-between hover:bg-gray-50 dark:hover:bg-[#252528] transition-colors gap-4">
                             <div class="flex-1 min-w-0 w-full">
                               <div class="font-bold text-[1.1em] mb-[0.25em] flex flex-wrap items-center gap-[0.5em]">
                                 <span class=${trade.type === 'sell' ? 'text-red-500' : 'text-green-500'}>
                                   ${trade.type === 'sell' ? 'SHORT' : 'LONG'}
                                 </span>
                                 <span class="font-extrabold text-gray-800 dark:text-gray-200">${trade.symbol}</span>
                                 <span class="text-[0.7em] px-[0.5em] py-[0.2em] bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 rounded-md">
                                   ${trade.shares.toLocaleString()} shares | ${formatR(trade.riskR)}R
                                 </span>
                                 
                                 <!-- Live return badge -->
                                 ${hasLivePrice && html`
                                   <span class=${`text-[0.7em] px-[0.5em] py-[0.2em] rounded-md font-bold ${tradeProfit >= 0 ? 'bg-green-100 text-green-800 dark:bg-green-950 dark:text-green-300' : 'bg-red-100 text-red-800 dark:bg-red-950 dark:text-red-300'}`}>
                                     P&L: ${tradeProfit >= 0 ? '+' : ''}$${tradeProfit.toFixed(2)} (${tradeProfit >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)
                                   </span>
                                 `}
                               </div>
                               <div class="text-[0.875em] text-gray-500 dark:text-gray-400 grid grid-cols-2 gap-x-[1.5em] gap-y-[0.1em] mb-[0.5em]">
                                 <span>Entry: $${trade.entry.toFixed(2)}</span>
                                 <span>SL: $${trade.stopLoss.toFixed(2)}</span>
                                 <span>Target: $${trade.target.toFixed(2)}</span>
                                 <span>Cost Basis: $${trade.positionValue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                                 ${hasLivePrice && html`<span class="col-span-2 text-blue-500 font-semibold">Live Quote: $${livePrice.toFixed(2)}</span>`}
                               </div>

                               <!-- Editable Trading Rationale Section inside card -->
                               <div class="mt-2 bg-gray-50 dark:bg-black/15 p-[0.75em] rounded-xl border border-gray-100 dark:border-gray-800/40 text-[0.875em]">
                                 <div class="flex justify-between items-center mb-1 text-[0.8em] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">
                                   <span>${t.tradingNotes}</span>
                                   ${isEditingNote ? html`
                                     <button onClick=${() => handleSaveInlineNote(trade.id)} class="text-blue-500 flex items-center space-x-1 cursor-pointer">
                                       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span>${t.saveNote}</span>
                                     </button>
                                   ` : html`
                                     <button onClick=${() => handleStartEditNote(trade)} class="text-gray-400 hover:text-blue-500 flex items-center space-x-1 cursor-pointer">
                                       <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> <span>${t.editNote}</span>
                                     </button>
                                   `}
                                 </div>
                                 ${isEditingNote ? html`
                                   <textarea 
                                     value=${editTradeNotes}
                                     onChange=${(e) => setEditTradeNotes(e.target.value)}
                                     rows="2"
                                     class="w-full bg-white dark:bg-black border border-gray-200 dark:border-gray-800 px-[0.75em] py-[0.5em] rounded-lg text-gray-700 dark:text-gray-300 focus:outline-none"
                                   />
                                 ` : html`
                                   <p class="text-gray-600 dark:text-gray-400 italic whitespace-pre-wrap">
                                     ${trade.rationale || 'No strategy notes recorded.'}
                                   </p>
                                 `}
                               </div>
                             </div>

                             <div class="flex sm:flex-col gap-2 w-full sm:w-auto">
                               <!-- iOS Close Trade Modal Button Trigger -->
                               <button 
                                 onClick=${() => handleClosePositionClick(trade)}
                                 class="flex-1 sm:flex-initial bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-[1em] py-[0.5em] rounded-xl text-[0.875em] cursor-pointer"
                               >
                                 ${t.closeTradeBtn}
                               </button>
                               <button 
                                 onClick=${() => removeTrade(trade.id)}
                                 class="p-[0.5em] text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors flex justify-center items-center cursor-pointer"
                               >
                                 <${TrashIcon} />
                               </button>
                             </div>
                           </div>
                         `;
                       })}
                     </div>
                   `}
                </div>

                <!-- Google Sheets Sync Config -->
                <div class=${iOSCardClass}>
                  <div class="flex items-center justify-between mb-[0.75em]">
                    <div class="flex items-center space-x-[0.5em]">
                       <${CloudIcon} class="text-blue-500" />
                       <h3 class="font-bold text-gray-800 dark:text-gray-200 text-[1em]">${t.googleDriveTitle}</h3>
                    </div>
                    <button 
                      onClick=${() => setShowGdriveConfig(!showGdriveConfig)} 
                      class="text-[0.875em] text-blue-500 hover:text-blue-600 font-medium focus:outline-none"
                    >
                      ${showGdriveConfig ? 'Hide Config' : 'Configuration Steps ⚙'}
                    </button>
                  </div>
                  <p class="text-[0.875em] text-gray-500 dark:text-gray-400 mb-[1.25em]">${t.googleDriveDesc}</p>
                  
                  ${showGdriveConfig && html`
                    <div class="mb-4 p-4 bg-gray-50 dark:bg-black/30 rounded-xl border border-gray-100 dark:border-gray-800/50 space-y-3">
                      <p class="text-[0.8em] text-gray-400 leading-relaxed">${t.googleInstructions}</p>
                      
                      <!-- Web App input -->
                      <div>
                        <label class="block text-[0.75em] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">${t.googleWebAppUrlLabel}</label>
                        <input 
                          type="text" 
                          value=${gdriveWebAppUrl}
                          onChange=${(e) => handleSaveWebAppUrl(e.target.value)}
                          placeholder="https://script.google.com/macros/s/.../exec"
                          class="w-full bg-white dark:bg-black/50 border border-gray-200 dark:border-gray-800 px-[0.75em] py-[0.5em] rounded-xl text-[0.875em] focus:outline-none focus:border-blue-500"
                        />
                      </div>

                      <!-- Shareable Sheet link input -->
                      <div>
                        <label class="block text-[0.75em] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">${t.googleSheetLinkLabel}</label>
                        <input 
                          type="text" 
                          value=${gdriveSheetUrl}
                          onChange=${(e) => handleSaveSheetUrl(e.target.value)}
                          placeholder="https://docs.google.com/spreadsheets/d/.../edit"
                          class="w-full bg-white dark:bg-black/50 border border-gray-200 dark:border-gray-800 px-[0.75em] py-[0.5em] rounded-xl text-[0.875em] focus:outline-none focus:border-blue-500"
                        />
                      </div>
                    </div>
                  `}

                  <div class="space-y-[0.75em]">
                    <div class="flex flex-col sm:flex-row gap-[0.5em]">
                      <button 
                        onClick=${pullTradesFromGoogleSheets}
                        disabled=${!gdriveWebAppUrl || !gdriveSheetUrl}
                        class="flex-1 bg-blue-500 hover:bg-blue-600 disabled:opacity-40 text-white font-bold py-[0.75em] rounded-xl transition-colors text-[0.95em]"
                      >
                        ${t.googleLoginBtn}
                      </button>
                      <button 
                        onClick=${() => pushTradesToGoogleSheets()}
                        disabled=${!gdriveWebAppUrl || !gdriveSheetUrl}
                        class="flex-1 bg-green-500 hover:bg-green-600 disabled:opacity-40 text-white font-bold py-[0.75em] rounded-xl transition-colors text-[0.95em]"
                      >
                        ${t.googleLogoutBtn}
                      </button>
                    </div>
                    
                    ${syncStatus && html`
                      <div class="text-center text-[0.825em] font-semibold mt-[0.5em]">
                        ${syncStatus === 'syncing' && html`<span class="text-blue-500 animate-pulse">Syncing Google Sheets...</span>`}
                        ${syncStatus === 'synced' && html`<span class="text-green-500">Google Sheets Synced successfully ✓</span>`}
                        ${syncStatus === 'error' && html`<span class="text-red-500">Google Sheets Connection Error ✗ (Open settings to configure your URLs)</span>`}
                      </div>
                    `}
                  </div>
                </div>

              </div>
            `}

            <!-- TRADE HISTORY SCREEN (CLOSED POSITIONS) -->
            ${activeTab === 'history' && html`
              <div class="transition-all duration-300 space-y-[1.5em]">
                
                <!-- Realized Portfolio Metrics Card -->
                <div class="bg-white dark:bg-[#1C1C1E] rounded-2xl p-[1.5em] shadow-sm border-l-4 ${portfolioStats.realizedPnL >= 0 ? 'border-green-500' : 'border-red-500'}">
                   <span class="block text-xs uppercase font-semibold text-gray-500 dark:text-gray-400 tracking-wider">${t.realizedPnL}</span>
                   <div class=${`font-bold text-[1.75em] ${portfolioStats.realizedPnL >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                     ${portfolioStats.realizedPnL >= 0 ? '+' : ''}$${portfolioStats.realizedPnL.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                   </div>
                </div>

                <div class=${`${iOSCardClass} p-0 overflow-hidden`}>
                   <div class="p-[1em] border-b border-gray-100 dark:border-gray-800">
                     <h3 class="font-bold text-gray-800 dark:text-gray-200 text-[1em]">${t.historyTab}</h3>
                   </div>

                   ${history.length === 0 ? html`
                     <div class="p-[2em] text-center text-gray-500 dark:text-gray-400 text-[0.9em]">
                       ${t.noHistory}
                     </div>
                   ` : html`
                     <div class="divide-y divide-gray-100 dark:divide-gray-800">
                       ${history.map(item => {
                         const isBuy = item.type !== 'sell';
                         const tradeProfit = (isBuy ? (item.exitPrice - item.entry) : (item.entry - item.exitPrice)) * item.shares;
                         const profitPercent = ((isBuy ? (item.exitPrice - item.entry) : (item.entry - item.exitPrice)) / item.entry) * 100;

                         return html`
                           <div key=${item.id} class="p-[1.25em] flex items-center justify-between hover:bg-gray-50 dark:hover:bg-[#252528] transition-colors">
                             <div class="flex-1 min-w-0 pr-4">
                               <div class="font-bold text-[1.1em] mb-[0.25em] flex flex-wrap items-center gap-[0.5em]">
                                 <span class=${item.type === 'sell' ? 'text-red-500' : 'text-green-500'}>
                                   ${item.type === 'sell' ? 'SHORT' : 'LONG'}
                                 </span>
                                 <span class="font-extrabold text-gray-800 dark:text-gray-200">${item.symbol}</span>
                                 <span class="text-[0.7em] px-[0.5em] py-[0.2em] bg-gray-100 text-gray-800 dark:bg-gray-800 dark:text-gray-300 rounded-md">
                                   ${item.shares.toLocaleString()} shares | ${formatR(item.riskR)}R
                                 </span>
                                 <span class=${`text-[0.7em] px-[0.5em] py-[0.2em] rounded-md font-bold ${tradeProfit >= 0 ? 'bg-green-100 text-green-800 dark:bg-green-950 dark:text-green-300' : 'bg-red-100 text-red-800 dark:bg-red-950 dark:text-red-300'}`}>
                                   Profit: ${tradeProfit >= 0 ? '+' : ''}$${tradeProfit.toFixed(2)} (${tradeProfit >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)
                                 </span>
                               </div>
                               <div class="text-[0.875em] text-gray-500 dark:text-gray-400 grid grid-cols-2 gap-x-[1.5em] gap-y-[0.1em]">
                                 <span>Entry: $${item.entry.toFixed(2)}</span>
                                 <span>Exit: $${item.exitPrice.toFixed(2)}</span>
                                 <span>SL: $${item.stopLoss.toFixed(2)}</span>
                                 <span>Closed basis: ${new Date(item.closedAt).toLocaleDateString()}</span>
                               </div>
                               ${item.rationale && html`
                                 <div class="mt-2 text-[0.8em] text-gray-400 italic">
                                    Notes: ${item.rationale}
                                 </div>
                               `}
                             </div>
                             <button 
                               onClick=${() => removeHistoryItem(item.id)}
                               class="p-[0.75em] text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors flex-shrink-0"
                             >
                               <${TrashIcon} />
                             </button>
                           </div>
                         `;
                       })}
                     </div>
                   `}
                </div>
              </div>
            `}

            <!-- Premium iOS bottom Disclosure Footer Section -->
            <footer class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-800 text-[0.75em] text-gray-400 dark:text-gray-500 space-y-3">
               
               <!-- 1. How to use -->
               <div class="border-b border-gray-100 dark:border-gray-800 pb-2">
                 <button onClick=${() => toggleDisclosure('how')} class="w-full flex justify-between items-center font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none">
                   <span>How To Use This App</span>
                   <span>${disclosureOpen['how'] ? '▲' : '▼'}</span>
                 </button>
                 ${disclosureOpen['how'] && html`
                   <div class="mt-2 leading-relaxed space-y-2">
                     <p>1. Enter your <strong>Total Portfolio Size</strong> and target <strong>Base Risk (1R %)</strong> under the Portfolio settings tab.</p>
                     <p>2. Go to the Calculator. Enter a <strong>Stock Code</strong> (like TSLA, 0005, or BTC) to auto-fetch pricing and load daily candle snapshots.</p>
                     <p>3. Choose <strong>Buy/Sell</strong> direction, input Entry Price and customize your Stop-Loss trigger.</p>
                     <p>4. Set Target Risk (R) slider and Profit reward boundaries. Add position setup to your active watchlist with custom strategy rationale.</p>
                     <p>5. Close trades inside Portfolio tab once active targets are reached to record realized statistics.</p>
                   </div>
                 `}
               </div>

               <!-- 2. About & Copyright -->
               <div class="border-b border-gray-100 dark:border-gray-800 pb-2">
                 <button onClick=${() => toggleDisclosure('about')} class="w-full flex justify-between items-center font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none">
                   <span>About & Copyright</span>
                   <span>${disclosureOpen['about'] ? '▲' : '▼'}</span>
                 </button>
                 ${disclosureOpen['about'] && html`
                   <div class="mt-2 leading-relaxed">
                     <p>Trading Risk Calculator is a premium, client-side trade assistant built specifically to enforce standard Mark Minervini Volatility Contraction Pattern (VCP) risk sizing protocols.</p>
                     <p class="mt-2">© 2026 Trading Risk Calculator. All Rights Reserved. Capital safety and preservation remain your absolute trading priority.</p>
                   </div>
                 `}
               </div>

               <!-- 3. Sponsor -->
               <div class="border-b border-gray-100 dark:border-gray-800 pb-2">
                 <button onClick=${() => toggleDisclosure('sponsor')} class="w-full flex justify-between items-center font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none">
                   <span>Sponsor Development</span>
                   <span>${disclosureOpen['sponsor'] ? '▲' : '▼'}</span>
                 </button>
                 ${disclosureOpen['sponsor'] && html`
                   <div class="mt-2 leading-relaxed">
                     <p>Enjoy using this trading application? Support developer server endpoints, updates and real-time fetch protocols by sponsoring our open source roadmap.</p>
                     <p class="mt-2 italic text-gray-400">(Sponsorship details pending deployment integrations)</p>
                   </div>
                 `}
               </div>

               <!-- 4. Contact Us -->
               <div class="border-b border-gray-100 dark:border-gray-800 pb-2">
                 <button onClick=${() => toggleDisclosure('contact')} class="w-full flex justify-between items-center font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider py-1 focus:outline-none">
                   <span>Contact Us</span>
                   <span>${disclosureOpen['contact'] ? '▲' : '▼'}</span>
                 </button>
                 ${disclosureOpen['contact'] && html`
                   <div class="mt-2 leading-relaxed">
                     <p>For custom API setups, private sheets bridges, and VCP workflow enquiries, please contact our support desk.</p>
                     <p class="mt-2 italic text-gray-400">(Contact enquiry gateways pending integration)</p>
                   </div>
                 `}
               </div>

            </footer>

          </main>

          <!-- Custom iOS Overlay Sheet Modal for Position Closures -->
          ${closingTrade && html`
            <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end justify-center pb-safe-bottom" onClick=${() => setClosingTrade(null)}>
               <div class="bg-white dark:bg-[#1C1C1E] w-full max-w-3xl rounded-t-3xl p-[2em] shadow-xl space-y-[1.25em]" onClick=${(e) => e.stopPropagation()}>
                  <div class="flex justify-between items-center">
                    <h3 class="font-extrabold text-[1.125em]">${t.closeTradeTitle}</h3>
                    <span class="text-[1.125em] font-extrabold text-blue-500">${closingTrade.symbol}</span>
                  </div>

                  <div>
                     <label class="block text-[0.8em] font-semibold uppercase text-gray-400 tracking-wider mb-2">${t.exitPriceLabel}</label>
                     <div class="relative">
                       <span class="absolute left-0 top-[0.5em] text-gray-400">$</span>
                       <input 
                         type="number" 
                         step="any"
                         inputMode="decimal"
                         value=${exitPriceInput}
                         onChange=${(e) => setExitPriceInput(e.target.value)}
                         class="w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 py-2 focus:outline-none focus:border-blue-500 font-bold text-[1.25em] pl-[1.25em]"
                       />
                     </div>
                  </div>

                  <div class="flex gap-3 pt-2">
                     <button 
                       onClick=${() => setClosingTrade(null)} 
                       class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold py-[0.75em] rounded-xl text-[0.95em]"
                     >
                       ${t.cancelBtn}
                     </button>
                     <button 
                       onClick=${handleConfirmPositionClose}
                       class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-[0.75em] rounded-xl text-[0.95em]"
                     >
                       ${t.confirmCloseBtn}
                     </button>
                  </div>
               </div>
            </div>
          `}

        </div>
      `;
    }

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(React.createElement(App));
  </script>
</body>
</html>
